<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <!-- Placeholder title — overwritten synchronously in ``main.ts`` from
       ``environment.appName`` as soon as the application bundle runs.
       Kept non-empty so browsers still have something to display in
       the tab during the ~10–50 ms between parse and bundle exec. -->
  <title>Loading…</title>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (window.__APP__) {
        const logo = document.getElementById('logo'); // <link id="logo" ...>
        if (logo) {
          logo.href = window.__APP__.logoIco;
        }
      }
    });
  </script>
  <base href="/">
  <meta content="width=device-width, initial-scale=1" name="viewport">
  <!-- SEO + social cards. ``description`` is the static crawler-visible
       summary; the SPA does not currently surface per-route descriptions,
       so a domain-level pitch covers Lighthouse's SEO audit and gives
       Google / LinkedIn / Slack something useful to render in unfurls. -->
  <meta name="description" content="QuizOnline — Quiz and domain-scoped LMS platform: build courses, author quizzes, track learner progress.">
  <meta name="theme-color" content="#1e293b">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="QuizOnline">
  <meta property="og:title" content="QuizOnline">
  <meta property="og:description" content="Build courses, author quizzes, track learner progress — multilingual LMS by Foxugly.">
  <meta property="og:image" content="https://quizonline.foxugly.com/qna.png">
  <meta property="og:url" content="https://quizonline.foxugly.com/">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="QuizOnline">
  <meta name="twitter:description" content="Build courses, author quizzes, track learner progress — multilingual LMS by Foxugly.">
  <meta name="twitter:image" content="https://quizonline.foxugly.com/qna.png">
  <link rel="canonical" href="https://quizonline.foxugly.com/">
  <link href="" id="logo" rel="icon" type="image/x-icon">
</head>
<body>
<app-root></app-root>
</body>
</html>
