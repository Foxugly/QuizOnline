@if (lesson(); as l) {
  <app-page-header [title]="title()">
    <p-button slot="left"
      type="button"
      severity="secondary"
      [outlined]="true"
      icon="pi pi-arrow-left"
      [routerLink]="backHref()"
      [label]="editorUi().common.back" />
    @if (isCompleted()) {
      <p-tag slot="right" severity="success" [value]="ui().alreadyCompletedBadge" />
    }
    @if (editHref(); as href) {
      <p-button slot="right"
        type="button"
        severity="info"
        [outlined]="true"
        icon="pi pi-pencil"
        [routerLink]="href"
        [pTooltip]="ui().editButton"
        tooltipPosition="bottom"
        [attr.aria-label]="ui().editButton" />
    }
  </app-page-header>

  <app-lesson-reader [blocks]="blocks()" [scrollSpy]="true" />

  <!-- Private per-learner notes. Persisted via debounced PUT every
       600 ms of inactivity so the apprenant never loses progress
       when the tab closes. Empty by default — the placeholder
       suggests the use. -->
  <section class="lesson-notes" aria-labelledby="lesson-notes-heading">
    <header class="lesson-notes__head">
      <h2 id="lesson-notes-heading">
        <i class="pi pi-pencil" aria-hidden="true"></i>
        {{ ui().notesHeading }}
      </h2>
      @if (noteSavedAtLabel(); as label) {
        <span class="lesson-notes__saved">
          <i class="pi pi-check-circle"></i>
          {{ ui().notesSavedAt(label) }}
        </span>
      }
    </header>
    <textarea pTextarea rows="4"
              class="lesson-notes__area"
              [ngModel]="noteContent()"
              (ngModelChange)="onNoteChange($event)"
              [placeholder]="ui().notesPlaceholder"></textarea>
  </section>

  <footer class="lesson-footer">
    @if (prevLesson(); as prev) {
      <p-button
        class="lesson-footer__prev"
        type="button"
        severity="secondary"
        [outlined]="true"
        icon="pi pi-chevron-left"
        iconPos="left"
        [routerLink]="lessonHref(prev.id)"
        [label]="ui().prevLessonButton + ' — ' + prev.title" />
    }
    <p-button
      class="lesson-footer__complete"
      icon="pi pi-check-circle"
      [label]="ui().markCompletedButton"
      [disabled]="isCompleted() || completing()"
      (onClick)="completeLesson()" />
    @if (nextLesson(); as next) {
      <p-button
        class="lesson-footer__next"
        [class.lesson-footer__next--pulse]="isCompleted()"
        type="button"
        severity="primary"
        icon="pi pi-chevron-right"
        iconPos="right"
        [routerLink]="lessonHref(next.id)"
        [label]="ui().nextLessonButton + ' — ' + next.title" />
    }
  </footer>
} @else {
  <app-loading-skeleton [rows]="4" [attr.aria-label]="ui().pageLoading" />
}
