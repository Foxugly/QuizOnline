<div class="page">
  <div class="question__header">
    <div class="header-left">
      <p-button
        (onClick)="goBack()"
        icon="pi pi-arrow-left"
        [label]="editorUi().common.back"
        severity="secondary"
        text
      ></p-button>
    </div>

    <h1 class="header-title">{{ editorUi().pages.questionView.title }}</h1>

    <div class="header-right">
      <p-button
        (onClick)="goEdit(id)"
        icon="pi pi-pencil"
        [label]="editorUi().common.edit"
        severity="info"
      ></p-button>
    </div>
  </div>


  @if (loading()) {
    <app-loading-skeleton [rows]="2" [attr.aria-label]="editorUi().common.loading" />
  } @else if (error()) {
    <div class="question-detail__status question-detail__status--error">
      {{ error() }}
    </div>
  } @else if (quizNavItem()) {
    <app-quiz-question
      [quizNavItem]="quizNavItem()!"
      [showCorrectAnswers]="showCorrect"
      [disableQuizActions]="true"
      displayMode="preview"
    ></app-quiz-question>
    <div class="question-detail__buttons">
      <p-toggleButton
        [(ngModel)]="showCorrect"
        [disabled]="!canRevealCorrect()"
        [onLabel]="editorUi().pages.questionView.revealOn"
        [offLabel]="editorUi().pages.questionView.revealOff"
        onIcon="pi pi-eye-slash"
        offIcon="pi pi-eye"
      ></p-toggleButton>
    </div>
  }
</div>
