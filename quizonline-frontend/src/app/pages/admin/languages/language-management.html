<div class="page">
  <div class="header-line header-line--grid">
    <div class="header-spacer"></div>

    <div class="header-center">
      <h1 class="title">{{ t().title }}</h1>
    </div>

    <div class="header-actions"></div>
  </div>

  <div class="card">
    <div class="card-head">
      <h2 class="card-title"></h2>

      <div class="card-actions">
        <p-button
          (onClick)="openCreate()"
          icon="pi pi-plus"
          [label]="t().addLanguage"
          severity="primary"
          type="button">
        </p-button>
      </div>
    </div>

    <p-table
      [paginator]="languages().length > rows"
      [rows]="rows"
      [rowsPerPageOptions]="[5, 10, 20, 50]"
      [value]="languages()"
      showGridlines
      size="small"
      sortMode="single"
      stripedRows
      styleClass="table"
    >
      <ng-template #header>
        <tr>
          <th pSortableColumn="code">{{ t().code }} <p-sortIcon field="code"></p-sortIcon></th>
          <th pSortableColumn="name">{{ t().name }} <p-sortIcon field="name"></p-sortIcon></th>
          <th>{{ t().active }}</th>
          <th class="col-actions">{{ t().actions }}</th>
        </tr>
      </ng-template>

      <ng-template #body let-lang>
        <tr>
          <td>{{ lang.code }}</td>
          <td>{{ lang.name }}</td>
          <td style="text-align: center;">
            <p-toggleswitch
              [ngModel]="lang.active"
              (ngModelChange)="onActiveToggle(lang, $event)">
            </p-toggleswitch>
          </td>
          <td class="col-actions">
            <div class="row-actions">
              <p-button
                (click)="openEdit(lang)"
                icon="pi pi-pencil"
                severity="info"
                size="small"
                type="button">
              </p-button>

              <p-button
                (click)="confirmDelete(lang)"
                icon="pi pi-trash"
                severity="danger"
                size="small"
                type="button">
              </p-button>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<p-dialog
  [header]="editing() ? t().editLanguage : t().addLanguage"
  [(visible)]="dialogVisible"
  [modal]="true"
  [style]="{width: '450px'}">

  <div class="flex flex-column gap-3 mt-3">
    <div class="flex flex-column gap-1">
      <label for="langCode">{{ t().code }}</label>
      <input pInputText id="langCode" [(ngModel)]="formCode" />
    </div>

    <div class="flex flex-column gap-1">
      <label for="langName">{{ t().name }}</label>
      <input pInputText id="langName" [(ngModel)]="formName" />
    </div>

    <div class="flex align-items-center gap-2">
      <p-checkbox
        [(ngModel)]="formActive"
        [binary]="true"
        inputId="langActive">
      </p-checkbox>
      <label for="langActive">{{ t().active }}</label>
    </div>
  </div>

  <ng-template #footer>
    <p-button
      (onClick)="dialogVisible.set(false)"
      label="Cancel"
      severity="secondary"
      type="button">
    </p-button>
    <p-button
      (onClick)="save()"
      label="OK"
      severity="primary"
      type="button"
      [disabled]="!formCode || !formName">
    </p-button>
  </ng-template>
</p-dialog>

<p-confirmDialog></p-confirmDialog>
