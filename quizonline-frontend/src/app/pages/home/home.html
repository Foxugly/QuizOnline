<section class="home-page">
  <header class="hero">
    <div class="hero__content">
      <p class="hero__eyebrow">{{ ui().home.eyebrow }}</p>
      <h1>{{ app.name }}</h1>
      <p class="hero__lead">{{ ui().home.lead }}</p>

      <div class="hero__actions">
        <p-button [routerLink]="primaryCta()" [label]="primaryCtaLabel()"></p-button>
        <p-button [routerLink]="secondaryCta()" [label]="secondaryCtaLabel()" variant="outlined"></p-button>
        <button (click)="contactClick()" class="hero__contact" type="button">
          <i class="pi pi-envelope"></i>
          <span>{{ ui().home.contactCta }}</span>
        </button>
      </div>
    </div>

    <aside class="hero__panel">
      <div class="hero-stat">
        <span class="hero-stat__label">{{ ui().home.mode }}</span>
        <strong>{{ isAdmin() ? ui().home.modeManager : isAuthenticated() ? ui().home.modeUser : ui().home.modeVisitor }}</strong>
      </div>
      <div class="hero-stat">
        <span class="hero-stat__label">{{ ui().home.languages }}</span>
        <strong>FR · EN · NL · IT · ES</strong>
      </div>
      <div class="hero-stat">
        <span class="hero-stat__label">{{ ui().home.features }}</span>
        <strong>{{ ui().home.featuresValue }}</strong>
      </div>
    </aside>
  </header>

</section>
