<div class="notifications-page">
  <header class="hero">
    <div>
      <h1 class="hero__title">{{ ui().notifications.pageTitle }}</h1>
      <p class="hero__subtitle">{{ ui().notifications.pageSubtitle }}</p>
    </div>
    <button
      pButton
      type="button"
      severity="secondary"
      [outlined]="true"
      [label]="ui().notifications.bellMarkAllRead"
      (click)="markAllRead()"
      [disabled]="filter() !== 'unread' || rows().length === 0">
    </button>
  </header>

  <div class="notifications-toolbar">
    <p-selectbutton
      [options]="filterOptions()"
      optionLabel="label"
      optionValue="value"
      [ngModel]="filter()"
      (ngModelChange)="onFilterChange($event)"
      [allowEmpty]="false">
    </p-selectbutton>
  </div>

  @if (initialLoad()) {
    <app-table-skeleton [rows]="6" [columns]="3" />
  } @else {
  <p-table
    [value]="rows()"
    [lazy]="true"
    [paginator]="true"
    [rows]="pageSize"
    [totalRecords]="total()"
    [loading]="loading()"
    [first]="(page() - 1) * pageSize"
    (onLazyLoad)="onLazyLoad($event)"
    styleClass="notifications-table"
    size="small"
    stripedRows>
    <ng-template #header>
      <tr>
        <th></th>
        <th></th>
        <th></th>
      </tr>
    </ng-template>
    <ng-template #body let-row>
      <tr [class.notifications-table__row--unread]="!row.read_at" class="notifications-table__row">
        <td class="notifications-table__line" (click)="openRow(row)">{{ lineFor(row) }}</td>
        <td class="notifications-table__date" [attr.title]="row.created_at | date:'medium'" (click)="openRow(row)">
          {{ relativeFor(row.created_at) }}
        </td>
        <td class="notifications-table__actions">
          @if (!row.read_at && !row.deleted_at) {
            <button
              pButton
              type="button"
              size="small"
              severity="secondary"
              [outlined]="true"
              icon="pi pi-check"
              [pTooltip]="ui().notifications.actionMarkRead"
              (click)="markRead(row)">
            </button>
          }
          @if (!row.deleted_at) {
            <button
              pButton
              type="button"
              size="small"
              severity="danger"
              [outlined]="true"
              icon="pi pi-trash"
              [pTooltip]="ui().notifications.actionDelete"
              (click)="remove(row)">
            </button>
          }
        </td>
      </tr>
    </ng-template>
    <ng-template #emptymessage>
      <tr>
        <td colspan="3">
          <app-empty-state
            icon="pi pi-inbox"
            [title]="ui().notifications.empty"
            [hint]="ui().notifications.emptyHint">
          </app-empty-state>
        </td>
      </tr>
    </ng-template>
  </p-table>
  }
</div>
