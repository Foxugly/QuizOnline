<div class="lms-catalog">
  <app-page-header [title]="ui().pageTitle">
    @if (canCreateCourse()) {
      <p-button slot="right"
        [routerLink]="createCourseHref"
        icon="pi pi-plus"
        [label]="ui().createCourseButton"
        type="button" />
    }
  </app-page-header>

  <div class="catalog-toolbar">
    <div class="filters">
      <input
        pInputText
        type="search"
        [placeholder]="ui().searchPlaceholder"
        [ngModel]="search()"
        (ngModelChange)="onSearchChange($event)"
      />
      <p-select
        [options]="levelOptions()"
        optionLabel="label"
        optionValue="value"
        [ngModel]="levelFilter()"
        (ngModelChange)="onLevelChange($event)"
        [placeholder]="ui().filterByLevelLabel"
        [showClear]="true"
      />
      @if (availableDomains().length > 1) {
        <p-select
          [options]="domainOptions()"
          optionLabel="label"
          optionValue="value"
          [ngModel]="domainFilter()"
          (ngModelChange)="onDomainChange($event)"
          [placeholder]="ui().filterByDomainLabel"
          [showClear]="true"
        />
      }
    </div>
  </div>

  @if (cards().length === 0) {
    <div class="empty-state">
      <h3>{{ ui().emptyTitle }}</h3>
      <p>{{ ui().emptyMessage }}</p>
    </div>
  } @else {
    <div class="grid-wrapper">
      @for (course of cards(); track course.id) {
        <article class="course-card">
          <header class="course-card__head">
            <h3 class="course-card__title">{{ course.title }}</h3>
            <div class="course-card__meta">
              <p-tag [value]="course.enrollmentLabel" />
              <span class="course-card__level">{{ course.levelLabel }}</span>
            </div>
          </header>
          <div class="course-card__description" [innerHTML]="course.description"></div>
          <footer class="course-card__foot">
            <p-button
              [routerLink]="course.href"
              icon="pi pi-arrow-right"
              iconPos="right"
              [label]="ui().viewButton"
              severity="primary"
              [outlined]="true" />
          </footer>
        </article>
      }
    </div>
  }
</div>
