<div class="page">
  <div class="card form-card">
    <div class="card-head">
      <h2 class="card-title">{{ ui().pages.userDelete.pageTitle }}</h2>
      <span class="badge badge--danger">{{ ui().pages.userDelete.irreversibleBadge }}</span>
    </div>

    <p>{{ ui().pages.userDelete.confirmPrefix }} <strong>{{ displayName() || (ui().pages.userDelete.userFallbackPrefix + userId()) }}</strong>{{ ui().pages.userDelete.confirmSuffix }}</p>

    @if (submitError()) {
      <p-message [text]="submitError()!" severity="error"></p-message>
    }

    <div class="footer-actions">
      <p-button
        (onClick)="cancel()"
        icon="pi pi-times"
        [label]="ui().common.cancel"
        severity="secondary"
        variant="outlined"
        type="button">
      </p-button>
      <p-button
        (onClick)="confirmDelete()"
        icon="pi pi-trash"
        [label]="ui().common.delete"
        severity="danger"
        type="button">
      </p-button>
    </div>
  </div>
</div>
