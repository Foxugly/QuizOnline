<app-page-header [title]="ui().pageTitle">
  <p-button slot="left"
    type="button"
    severity="secondary"
    [outlined]="true"
    icon="pi pi-arrow-left"
    [label]="editorUi().common.back"
    (onClick)="back()" />
  <p-button slot="right"
    type="button"
    severity="secondary"
    [outlined]="!previewMode()"
    [icon]="previewMode() ? 'pi pi-pencil' : 'pi pi-eye'"
    [label]="previewMode() ? ui().editModeButton : ui().previewButton"
    (onClick)="togglePreview()" />
</app-page-header>

@if (blocks().length === 0) {
  <div class="empty-state">
    <h3>{{ ui().emptyTitle }}</h3>
    <p>{{ ui().emptyHint }}</p>
  </div>
}

@if (previewMode()) {
  <app-lesson-reader [blocks]="blocks()" />
} @else {
  @if (hasLesson()) {
    <app-block-list-editor
      hostType="lesson"
      [hostId]="lessonId()"
      blockRole="body"
      [blocks]="blocks()"
      [availableLangs]="availableLangs()"
      [domainId]="domainId() || null"
      (blocksChanged)="onBlocksChanged()"
      (blockUpdated)="onBlockUpdated($event)" />
  }
}
