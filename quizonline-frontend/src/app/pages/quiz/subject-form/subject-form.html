<p-card class="quick-quiz-card">
  @if (error()) {
    <p-message severity="error" [text]="error() ?? ''"></p-message>
  }

  @if (success()) {
    <p-message severity="success" [text]="success() ?? ''"></p-message>
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="quick-quiz-form">
    <div class="quick-quiz-row1">
      <div class="field">
        <label for="title">{{ pageText().title }}</label>
        <input formControlName="title" id="title" pInputText type="text" />
      </div>

      <div class="field">
        <label for="domain">{{ pageText().domain }}</label>
        <p-select
          formControlName="domain_id"
          [options]="domainOptions"
          optionLabel="name"
          optionValue="code"
          appendTo="body"
          id="domain"
          [disabled]="true"
          [placeholder]="pageText().domainPlaceholder">
        </p-select>
      </div>

      <div class="field field--switch">
        <label for="with-duration">{{ pageText().timer }}</label>
        <div class="timer-switch">
          <p-toggleswitch formControlName="with_duration" inputId="with-duration"></p-toggleswitch>
          <span>{{ form.controls.with_duration.getRawValue() ? pageText().timerActive : pageText().timerInactive }}</span>
        </div>
      </div>

      <div class="field field--stat">
        <label for="timer">{{ pageText().duration }}</label>
        <p-inputNumber
          formControlName="duration"
          [max]="120"
          [min]="1"
          [showButtons]="true"
          [useGrouping]="false"
          inputId="timer"
          [suffix]="pageText().durationSuffix"
        >
        </p-inputNumber>
      </div>
    </div>

    <div class="quick-quiz-row2">
      <div class="field">
        <label for="subjects">{{ pageText().subjects }}</label>
        <p-multiSelect
          formControlName="subject_ids"
          [options]="subjectOptions"
          [showClear]="true"
          class="w-full"
          id="subjects"
          optionLabel="name"
          optionValue="code"
          (onPanelHide)="onSubjectsPanelHide()"
          [panelStyle]="{ 'max-height': '250px', 'overflow-y': 'auto' }"
          [placeholder]="pageText().subjectsPlaceholder">
        </p-multiSelect>
      </div>

      <div class="field field--stat">
        <label for="nbQuestions">
          @if (availableQuestionCount() > 0) {
            {{ questionCountWithMax(availableQuestionCount()) }}
          } @else {
            {{ pageText().questionCount }}
          }
        </label>
        <p-inputNumber
          formControlName="max_questions"
          [disabled]="!hasAvailableQuestions()"
          [max]="availableQuestionCount()"
          [min]="questionCountMin()"
          [showButtons]="true"
          [useGrouping]="false"
          inputId="nbQuestions"
        >
        </p-inputNumber>
      </div>
    </div>

    @if (cancelLabel() || submitLabel()) {
      <div class="footer-actions">
        @if (cancelLabel()) {
          <p-button
            (onClick)="cancel.emit()"
            icon="pi pi-times"
            [label]="cancelLabel()"
            severity="secondary"
            type="button"
            variant="outlined">
          </p-button>
        }
        @if (submitLabel()) {
          <p-button
            [disabled]="saving()"
            [loading]="saving()"
            icon="pi pi-sync"
            [label]="submitLabel()"
            type="submit">
          </p-button>
        }
      </div>
    }
  </form>
</p-card>
