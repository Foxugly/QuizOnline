<div class="page">
  @if (loading()) {
    <div class="question-detail__status">{{ editorUi().common.loading }}</div>
  } @else if (error()) {
    <div class="question-detail__status question-detail__status--error">
      {{ error() }}
    </div>
  } @else if (quizSession(); as session) {
    <app-quiz-summary-hero
      [session]="session"
      [showScore]="showScore()"
      [scoreLabel]="scoreLabel()"
      [scoreMetaLabel]="scoreMetaLabel()"
      [infoFacts]="infoFacts()"
      [dateFacts]="dateFacts()"
      [canReview]="canReview()"
      (back)="goBack()"
      (start)="goStart()"
      (openQuestion)="goQuestion()"
      (downloadPdf)="downloadPdf()"
    />
  }
</div>
