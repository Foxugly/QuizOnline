<div class="page">
  <div class="header-line header-line--grid">
    <div class="header-spacer"></div>

    <div class="header-center">
      <h1 class="title">{{ uiText().page.title }}</h1>
    </div>

    <div class="header-actions"></div>
  </div>

  @if (pendingDomains().length > 0) {
    <p-message severity="warn" [closable]="false">
      {{ uiText().messages.pendingApprovalBanner(pendingDomainNames()) }}
    </p-message>
  }

  <div class="card">
    <p-tabs [value]="activeTab()" (valueChange)="setActiveTab($event)" class="quiz-tabs">
      <p-tablist>
        <p-tab value="templates">
          <span class="quiz-tab-label">
            {{ uiText().tabs.templates }}
            <p-badge [value]="filteredTemplates().length.toString()" severity="secondary" />
          </span>
        </p-tab>
        <p-tab value="sessions">
          <span class="quiz-tab-label">
            {{ uiText().tabs.sessions }}
            <p-badge [value]="filteredMyQuizzes().length.toString()" severity="secondary" />
          </span>
        </p-tab>
        <div class="quiz-tabs__actions">
          <input
            [ngModel]="q()"
            (ngModelChange)="q.set($event)"
            pInputText
            [placeholder]="uiText().page.searchPlaceholder"
          >
          @if (canComposeTemplate()) {
            <p-button
              (onClick)="goCompose()"
              icon="pi pi-plus"
              id="btn_compose_quiz"
              [label]="uiText().page.compose"
              severity="primary"
              size="small"
              type="button"
            ></p-button>
          }
          @if (canCreateQuickTemplate()) {
            <p-button
              (onClick)="goNew()"
              icon="pi pi-plus"
              id="btn_add_subject"
              [label]="uiText().page.quickCreate"
              severity="secondary"
              size="small"
              type="button"
            ></p-button>
          }
        </div>
      </p-tablist>

      <p-tabpanels class="quiz-tabpanels">
        <p-tabpanel value="templates">
          <div class="quiz-bulk-row">
            <app-bulk-actions
              [options]="bulkActionOptions()"
              [placeholder]="uiText().bulk.placeholder"
              [applyLabel]="uiText().bulk.apply"
              [count]="selectedCount()"
              [countText]="uiText().bulk.selectedCount(selectedCount())"
              [applying]="applyingBulk()"
              (apply)="applyBulk($event)">
            </app-bulk-actions>
          </div>
          <app-quiz-template-table
            [templates]="filteredTemplates()"
            [loading]="loading()"
            [creatingTemplateId]="creatingTemplateId()"
            [uiText]="uiText()"
            [selection]="selectedTemplates()"
            (selectionChange)="onTemplatesSelectionChange($event)"
            (createFromTemplate)="createFromTemplate($event)"
            (openAssign)="openAssignDialog($event)"
            (openResults)="goResults($event.id)"
            (edit)="goEditTemplate($event)"
            (remove)="goDeleteTemplate($event)"
          ></app-quiz-template-table>
        </p-tabpanel>

        <p-tabpanel value="sessions">
          <app-quiz-session-table
            [quizzes]="filteredMyQuizzes()"
            [loading]="loading()"
            (viewQuiz)="goView($event)"
          ></app-quiz-session-table>
        </p-tabpanel>
      </p-tabpanels>
    </p-tabs>
  </div>
</div>

<app-quiz-template-assign-dialog
  [visible]="assignDialogVisible()"
  [template]="selectedTemplate()"
  [users]="assignableUsers()"
  [selectedRecipientIds]="selectedRecipientIds()"
  [assigning]="assigning()"
  [texts]="uiText()"
  (visibleChange)="assignDialogVisible.set($event)"
  (selectedRecipientIdsChange)="selectedRecipientIds.set($event)"
  (cancel)="closeAssignDialog()"
  (submitted)="submitAssignments()"
></app-quiz-template-assign-dialog>

<p-confirmDialog></p-confirmDialog>
