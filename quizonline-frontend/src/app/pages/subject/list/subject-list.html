<div class="page">
  <div class="header-line header-line--grid">
    <div class="header-spacer"></div>

    <div class="header-center">
      <h1 class="title">{{ pageText().title }}</h1>
    </div>

    <div class="header-actions"></div>
  </div>

  <div class="card">
    <div class="card-head">
      <app-bulk-actions
        [options]="bulkActionOptions()"
        [placeholder]="pageText().bulk.placeholder"
        [applyLabel]="pageText().bulk.apply"
        [count]="selectedCount()"
        [countText]="pageText().bulk.selectedCount(selectedCount())"
        [applying]="applyingBulk()"
        (apply)="applyBulk($event)">
      </app-bulk-actions>

      <div class="card-actions">
        <input
          pInputText
          [placeholder]="pageText().searchPlaceholder"
          [ngModel]="q()"
          (ngModelChange)="q.set($event); load()"
        />

        <p-button
          (onClick)="goNew()"
          icon="pi pi-plus"
          [label]="editorUi().common.add"
          severity="primary"
          type="button">
        </p-button>
      </div>
    </div>

    <p-table
      [dataKey]="'id'"
      [paginator]="rowsData().length > rows"
      [rows]="rows"
      [rowsPerPageOptions]="[5, 10, 20, 50]"
      [value]="rowsData()"
      [selection]="selectedRows()"
      (selectionChange)="onSelectionChange($event)"
      selectionMode="multiple"
      showGridlines
      size="small"
      sortMode="single"
      stripedRows
      styleClass="table"
    >
      <ng-template #header>
        <tr>
          <th class="col-checkbox" style="width: 3rem"></th>
          <th pSortableColumn="name" style="text-align: center;">{{ pageText().columns.name }} <p-sortIcon field="name"></p-sortIcon></th>
          <th pSortableColumn="active" style="text-align: center;">{{ pageText().columns.active }} <p-sortIcon field="active"></p-sortIcon></th>
          <th pSortableColumn="domainName" style="text-align: center;">{{ pageText().columns.domain }} <p-sortIcon field="domainName"></p-sortIcon></th>
          <th pSortableColumn="questionsCount" style="text-align: center;">{{ pageText().columns.questions }} <p-sortIcon field="questionsCount"></p-sortIcon></th>
          <th class="col-actions">{{ pageText().columns.actions }}</th>
        </tr>
      </ng-template>

      <ng-template #body let-s>
        <tr>
          <td class="col-checkbox">
            <p-tableCheckbox [value]="s"></p-tableCheckbox>
          </td>
          <td>{{ s.name }}</td>

          <td style="text-align: center;">
            @if (s.active) {
              <i class="pi pi-check-circle" style="color: #16a34a;"></i>
            } @else {
              <i class="pi pi-times-circle" style="color: #dc2626;"></i>
            }
          </td>

          <td style="text-align: center;">
            <p-button
              (onClick)="goDomain(s.domain)"
              [label]="s.domainName"
              severity="secondary"
              size="small"
              type="button"
              variant="outlined">
            </p-button>
          </td>

          <td style="text-align: center;">{{ s.questionsCount }}</td>

          <td class="col-actions">
            <div class="row-actions">
              <p-button
                (click)="goEdit(s.id)"
                icon="pi pi-pencil"
                id="btn_edit_subject"
                [pTooltip]="editorUi().common.edit"
                [attr.aria-label]="editorUi().common.edit"
                severity="info"
                size="small"
                text
                type="button">
              </p-button>

              <p-button
                (click)="goDelete(s.id)"
                icon="pi pi-trash"
                id="btn_delete_subject"
                [pTooltip]="editorUi().common.delete"
                [attr.aria-label]="editorUi().common.delete"
                severity="danger"
                size="small"
                text
                type="button">
              </p-button>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>

  </div>
</div>

<p-confirmDialog></p-confirmDialog>
