<div class="p-4">
  <div class="flex align-items-center gap-3 mb-4">
    <h2 class="m-0">{{ domainName() }} — {{ t().title }}</h2>
    @if (pendingCount()) {
      <p-badge [value]="'' + pendingCount()" severity="warn" />
    }
  </div>

  <div class="mb-3">
    <p-selectButton
      [options]="statusOptions()"
      [(ngModel)]="statusFilter"
      optionLabel="label"
      optionValue="value"
      (ngModelChange)="onStatusFilterChange()"
    />
  </div>

  <p-table [value]="requests()" [loading]="loading()" [rows]="50" [paginator]="requests().length > 50">
    <ng-template #header>
      <tr>
        <th>{{ t().user }}</th>
        <th>{{ t().email }}</th>
        <th>{{ t().requestedAt }}</th>
        <th>{{ t().status }}</th>
        <th>{{ t().actions }}</th>
      </tr>
    </ng-template>
    <ng-template #body let-req>
      <tr>
        <td>{{ userNameFor(req.user) }}</td>
        <td>—</td>
        <td>{{ req.created_at | date:'short' }}</td>
        <td>
          <p-tag [value]="statusLabel(req.status)" [severity]="statusSeverity(req.status)" />
        </td>
        <td>
          @if (isPending(req)) {
            <button pButton [label]="t().approve" severity="success" size="small" class="mr-2" (click)="approve(req)"></button>
            <button pButton [label]="t().reject" severity="danger" size="small" (click)="openRejectDialog(req)"></button>
          }
        </td>
      </tr>
    </ng-template>
    <ng-template #emptymessage>
      <tr>
        <td colspan="5" class="text-center p-4">{{ t().noRequests }}</td>
      </tr>
    </ng-template>
  </p-table>
</div>

<p-dialog
  [header]="t().rejectReason"
  [(visible)]="rejectDialogVisible"
  [modal]="true"
  [style]="{ width: '30rem' }"
>
  <textarea
    pInputTextarea
    [(ngModel)]="rejectReason"
    [placeholder]="t().rejectReasonPlaceholder"
    rows="4"
    class="w-full"
  ></textarea>
  <ng-template #footer>
    <button pButton [label]="t().reject" severity="danger" (click)="confirmReject()"></button>
  </ng-template>
</p-dialog>
