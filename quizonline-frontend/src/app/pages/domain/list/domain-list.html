<div class="page">
  <div class="header-line header-line--grid">
    <div class="header-spacer"></div>

    <div class="header-center">
      <h1 class="title">Domaines</h1>
      <p class="subtitle muted">Recherche, liste et actions</p>
    </div>

    <div class="header-actions"></div>
  </div>

  <div class="card">
    <div class="card-head">
      <h2 class="card-title"></h2>

      <div class="card-actions">
        <input
          pInputText
          placeholder="Rechercher..."
          [ngModel]="q()"
          (ngModelChange)="q.set($event); load()"
        />

        <p-button
          (onClick)="goNew()"
          icon="pi pi-plus"
          id="btn_add_domain"
          [label]="editorUi().common.add"
          severity="primary"
          type="button">
        </p-button>
      </div>
    </div>

    <p-table
      [paginator]="rowsData().length > rows"
      [rows]="rows"
      [rowsPerPageOptions]="[5, 10, 20, 50]"
      [value]="rowsData()"
      showGridlines
      size="small"
      sortMode="single"
      stripedRows
      styleClass="table"
    >
      <ng-template #header>
        <tr>
          <th pSortableColumn="id" style="text-align: center;">ID <p-sortIcon field="id"></p-sortIcon></th>
          <th pSortableColumn="name" style="text-align: center;">Nom <p-sortIcon field="name"></p-sortIcon></th>
          <th pSortableColumn="description" style="text-align: center;">Description <p-sortIcon field="description"></p-sortIcon></th>
          <th pSortableColumn="subjectsCount" style="text-align: center;">Sujets <p-sortIcon field="subjectsCount"></p-sortIcon></th>
          <th pSortableColumn="questionsCount" style="text-align: center;">Questions <p-sortIcon field="questionsCount"></p-sortIcon></th>
          <th pSortableColumn="pendingJoinRequests" style="text-align: center;">Demandes <p-sortIcon field="pendingJoinRequests"></p-sortIcon></th>
          <th class="col-actions">Actions</th>
        </tr>
      </ng-template>

      <ng-template #body let-d>
        <tr>
          <td style="text-align: center;">{{ d.id }}</td>

          <td class="truncate">{{ d.name }}</td>

          <td class="muted desc-cell">
            <div class="desc" [innerHTML]="d.description | stripP"></div>
          </td>

          <td style="text-align: center;">{{ d.subjectsCount }}</td>

          <td style="text-align: center;">{{ d.questionsCount }}</td>

          <td style="text-align: center;">
            @if (d.pendingJoinRequests > 0) {
              <a [routerLink]="['/domain', d.id, 'join-requests']" class="p-badge p-badge-warning" style="cursor:pointer; text-decoration:none">
                {{ d.pendingJoinRequests }}
              </a>
            } @else {
              <span class="muted">&mdash;</span>
            }
          </td>

          <td class="col-actions">
            <div class="row-actions">
              <p-button
                (click)="goEdit(d.id)"
                icon="pi pi-pencil"
                id="btn_edit_domain"
                severity="info"
                size="small"
                type="button">
              </p-button>

              <p-button
                (click)="goDelete(d.id)"
                icon="pi pi-trash"
                id="btn_delete_domain"
                severity="danger"
                size="small"
                type="button">
              </p-button>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>

  </div>
</div>
