<app-auth-card icon="pi pi-envelope" [title]="shellUi().confirmEmail.title">
  <p class="auth-card-subtitle">{{ shellUi().confirmEmail.subtitle }}</p>

  @if (loading()) {
    <p-message severity="info">{{ shellUi().confirmEmail.inProgress }}</p-message>
  }

  @if (successMessage()) {
    <p-message severity="success">{{ successMessage() }}</p-message>
  }

  @if (errorMessage()) {
    <p-message severity="error">{{ errorMessage() }}</p-message>
  }

  <div class="actions">
    <p-button (onClick)="goLogin()" [label]="ui().common.login" icon="pi pi-sign-in"></p-button>
  </div>
</app-auth-card>
