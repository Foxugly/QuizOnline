<app-auth-card icon="pi pi-envelope" [title]="ui().registerPending.title">
  <p class="auth-card-subtitle">{{ ui().registerPending.subtitle }}</p>

  <div class="notice">
    <p class="notice__lead">{{ ui().registerPending.lead }}</p>
    <p class="notice__body">{{ ui().registerPending.body }}</p>
  </div>

  <div class="actions">
    <p-button
      (onClick)="goLogin()"
      [label]="ui().registerPending.login"
      icon="pi pi-sign-in"
    ></p-button>
  </div>
</app-auth-card>
