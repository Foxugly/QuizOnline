<div class="lesson-reader" [class.lesson-reader--has-outline]="outline().length > 0">
  @if (outline().length > 0) {
    <aside class="lesson-outline" [attr.aria-label]="ui().outlineHeading">
      <h2 class="lesson-outline__heading">{{ ui().outlineHeading }}</h2>
      <ol class="lesson-outline__list">
        @for (item of outline(); track item.id; let i = $index) {
          <li>
            <a class="lesson-outline__link"
               [class.lesson-outline__link--active]="scrollSpy() && activeAnchor() === item.anchor"
               [href]="anchorHref(item.anchor)"
               (click)="scrollToBlock($event, item.anchor)">
              <span class="lesson-outline__index">{{ i + 1 }}</span>
              <i [class]="item.icon"></i>
              <span class="lesson-outline__label">{{ item.label }}</span>
            </a>
          </li>
        }
      </ol>
    </aside>
  }

  <section class="lesson-body">
    @for (block of blocks(); track block.id) {
      <app-block-card [block]="block" />
    }
  </section>
</div>
