<div class="empty-state" [class.empty-state--compact]="density() === 'compact'">
  <i class="empty-state__icon" [class]="'empty-state__icon ' + icon()" aria-hidden="true"></i>
  <h3 class="empty-state__title">{{ title() }}</h3>
  @if (hint(); as h) {
    <p class="empty-state__hint">{{ h }}</p>
  }
  @if (cta(); as label) {
    <p-button
      class="empty-state__cta"
      type="button"
      [label]="label"
      severity="secondary"
      [outlined]="true"
      size="small"
      (onClick)="ctaClick.emit()">
    </p-button>
  }
</div>
