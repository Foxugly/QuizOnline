<!-- Bandeau "backend KO" — global, au-dessus de tous les shells. -->
@if (backendDown()) {
  <div class="backend-banner">
    {{ status.lastError() || 'API inaccessible.' }}
  </div>
}

<!-- Toast unique pour toute l'application. -->
<p-toast position="top-right" />

<!-- Les routes rendent le shell public/authentifié (skip-link + topmenu +
     main#main-content + footer) via public-layout / main-layout. -->
<router-outlet></router-outlet>
