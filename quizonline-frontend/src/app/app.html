<!-- Keyboard-only skip link: visually hidden until focused. Lets screen-reader
     and keyboard users jump past the top menu straight to the page body. -->
<a class="skip-link" href="#main-content">{{ ui().a11y.skipToContent }}</a>

<!-- Bandeau "backend KO" -->
@if (backendDown()) {
  <div class="backend-banner">
    {{ status.lastError() || 'API inaccessible.' }}
  </div>
}

<!-- Menu principal -->
<app-topmenu></app-topmenu>

<p-toast position="top-right" />

<!-- Contenu principal -->
<main id="main-content" tabindex="-1" class="main-container">
  <router-outlet></router-outlet>
</main>

<app-footer></app-footer>
