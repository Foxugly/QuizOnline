<p-dialog
  [modal]="true"
  [style]="{ width: '92vw', maxWidth: '1080px' }"
  [visible]="visible()"
  [header]="pageText().header"
  (visibleChange)="onVisibleChange($event)">
  @if (loading()) {
    <div class="question-preview-dialog__state">{{ pageText().loading }}</div>
  } @else if (error(); as err) {
    <div class="alert alert--error">{{ err }}</div>
  } @else if (previewItem(); as item) {
    <app-quiz-question
      [quizNavItem]="item"
      [readonlyMode]="true"
      [showCorrectAnswers]="false"
      [showFooter]="false"
      displayMode="preview">
    </app-quiz-question>
  }
</p-dialog>
