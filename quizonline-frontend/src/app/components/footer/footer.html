<footer class="app-footer">
  <div class="app-footer__inner">
    <span class="app-footer__brand">{{ app.name }}</span>
    <span class="app-footer__baseline">{{ ui().footer.baseline }}</span>
    <span class="app-footer__meta">
      <span>{{ ui().footer.version }} {{ app.version }}</span>
      <span class="app-footer__sep" aria-hidden="true">·</span>
      <span class="app-footer__copyright">
        © {{ app.year }}
        <a href="https://www.foxugly.com" target="_blank" rel="noopener noreferrer" class="app-footer__author-link">
          <img src="/foxugly-logo.svg" alt="" class="app-footer__author-logo" aria-hidden="true" />
          {{ app.author }}
        </a>
      </span>
      <span class="app-footer__sep" aria-hidden="true">·</span>
      <a routerLink="/privacy" class="app-footer__link">{{ ui().footer.privacyLink }}</a>
    </span>
  </div>
</footer>
