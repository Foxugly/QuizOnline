<form (ngSubmit)="submit()" [formGroup]="form()" class="question-context">
  <div class="meta-grid meta-grid--context">
    <div class="meta-item">
      <label class="meta-label">{{ ui().questionForm.active }}</label>
      <div class="meta-value widget-center">
        <p-checkbox [binary]="true" formControlName="active"></p-checkbox>
      </div>
    </div>

    <div class="meta-item">
      <label class="meta-label">{{ ui().questionForm.domain }}</label>
      <div class="meta-value">
        @if (showDomainSelect()) {
          <p-select
            [filter]="true"
            [options]="domainOptions()"
            formControlName="domain"
            optionLabel="name"
            optionValue="id"
            [placeholder]="ui().questionForm.chooseDomain">
          </p-select>
        } @else {
          <div class="meta-value--readonly">
            {{ domainReadonlyLabel() || ui().questionForm.domainUnavailable }}
          </div>
        }
      </div>
    </div>

    <div class="meta-item">
      <label class="meta-label">{{ ui().questionForm.subjects }}</label>
      <div class="meta-value">
        <p-multiSelect
          [filter]="true"
          [options]="subjectOptions()"
          [showClear]="true"
          formControlName="subject_ids"
          optionLabel="name"
          optionValue="code"
          [placeholder]="ui().questionForm.chooseSubjects">
        </p-multiSelect>
      </div>
    </div>

    <div class="meta-item">
      <label class="meta-label">{{ ui().questionForm.mode }}</label>
      <div class="meta-value mode-row widget-center">
        <label class="mode-chip">
          <p-checkbox [binary]="true" formControlName="is_mode_practice"></p-checkbox>
          <span>{{ ui().questionForm.practice }}</span>
          @if (practiceTooltip()) {
            <p-button
              icon="pi pi-info-circle"
              [pTooltip]="practiceTooltipText()"
              severity="secondary"
              tooltipPosition="top"
              type="button">
            </p-button>
          }
        </label>

        <label class="mode-chip">
          <p-checkbox [binary]="true" formControlName="is_mode_exam"></p-checkbox>
          <span>{{ ui().questionForm.exam }}</span>
          @if (examTooltip()) {
            <p-button
              icon="pi pi-info-circle"
              [pTooltip]="examTooltipText()"
              severity="secondary"
              tooltipPosition="top"
              type="button">
            </p-button>
          }
        </label>
      </div>
    </div>
  </div>

  <!-- Title input + Media card are gone — Phase 3.5 moved title into
       ``<app-question-block-tabs>`` Question tab, and media is now one
       of the eight block types per zone. Bottom action bar (Cancel /
       Save) and top-right header buttons (Dupliquer / Preview / Delete)
       both live at the page-shell level so the editor + block tabs
       share a single card frame. -->
  @if (!hasContentContext()) {
    <div class="status-card">{{ emptyLanguagesMessage() || ui().questionForm.noActiveLanguages }}</div>
  }

  @if (submitError()) {
    <div class="error">
      {{ submitError() }}
    </div>
  }
</form>
