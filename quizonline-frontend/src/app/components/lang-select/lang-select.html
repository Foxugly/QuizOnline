<div #menuRoot class="lang-select">
  <button
    type="button"
    class="lang-select__trigger"
    (click)="toggleMenu($event)"
    [attr.aria-expanded]="menuOpen"
    aria-haspopup="menu"
  >
    <i class="pi pi-globe"></i>
    <span>{{ internalLang.toUpperCase() }}</span>
  </button>

  @if (menuOpen) {
    <div class="lang-select__menu" role="menu">
      @for (option of langOptions; track option.value) {
        <button
          type="button"
          class="lang-select__item"
          (click)="onInternalChange(option.value)"
        >
          {{ option.label }}
        </button>
      }
    </div>
  }
</div>
