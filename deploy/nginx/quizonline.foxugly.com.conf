# QuizOnline — nginx reverse proxy  (PRODUCTION, quizonline.foxugly.com)
#
# ⚠️ MANAGED FILE — do NOT edit /etc/nginx/sites-available/quizonline.foxugly.com
# on the box. The deploy pipeline reinstalls this exact file (from the
# committed git blob at origin/main) on every deploy, validates it with
# `nginx -t`, and reloads — so any manual edit on the server is reverted on
# the next deploy. Change THIS file in the repo
# (deploy/nginx/quizonline.foxugly.com.conf), commit, and let the deploy
# apply it. See .github/workflows/deploy.yml (SSM step) and deploy/README.md.
#
# This is the single source of truth for the prod vhost — both the first
# manual bootstrap and every subsequent deploy install THIS file (see
# deploy/README.md). There is no separate domain-agnostic template.

# --- HTTP -> HTTPS redirect ---
server {
    listen 80;
    listen [::]:80;
    server_name quizonline.foxugly.com;

    return 301 https://$host$request_uri;
}

# --- HTTPS ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name quizonline.foxugly.com;

    ssl_certificate     /etc/letsencrypt/live/foxugly.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/foxugly.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Compression ---
    # Ubuntu's nginx ships ``gzip on`` in the http {} block of
    # /etc/nginx/nginx.conf, but its default ``gzip_types`` is restricted
    # to text/html. We extend it here so Angular bundles, generated CSS,
    # JSON API responses, SVGs and woff2 fonts also get compressed on the
    # wire. Cuts a 180 KB Angular main.js to ~50 KB transferred — visible
    # win on first paint, especially on mobile / high-latency links.
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        application/javascript
        application/json
        application/manifest+json
        application/wasm
        application/xml
        application/rss+xml
        application/atom+xml
        font/woff
        font/woff2
        image/svg+xml
        image/x-icon
        text/css
        text/plain
        text/xml;

    # Brotli compresses 15-25 % better than gzip on textual content. ACTIVE
    # here — the prod host has the module installed:
    #   apt-get install -y libnginx-mod-http-brotli-filter libnginx-mod-http-brotli-static
    # ⚠️ The ``brotli`` directive below requires that module; on a host without
    # it, ``nginx -t`` fails (and the deploy's nginx -t guard rolls back). When
    # bootstrapping a fresh host, install the module BEFORE applying this conf
    # (see deploy/README.md → "Enable brotli on a fresh host").
    brotli on;
    brotli_comp_level 5;
    brotli_min_length 256;
    brotli_types
        application/javascript
        application/json
        application/manifest+json
        application/wasm
        application/xml
        application/rss+xml
        image/svg+xml
        image/x-icon
        font/woff
        font/woff2
        text/css
        text/plain
        text/xml;

    # --- Security headers ---
    # NB: nginx's add_header is NOT inherited the moment a location declares
    # its own add_header. The locations below that need Cache-Control
    # therefore re-emit the security headers via a shared snippet.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # --- Frontend runtime config (injected into index.html via sub_filter) ---
    # Empty defaults so the config is valid even when no Sentry/GlitchTip
    # ingest is configured — the frontend SDK then never even loads.
    # Operator overrides these by dropping
    # /etc/nginx/snippets/quizonline-frontend-runtime.conf
    # with ``set $sentry_dsn "...";`` lines. The glob include below
    # silently tolerates an absent snippet.
    set $sentry_dsn "";
    set $sentry_env "production";
    set $sentry_release "";
    set $turnstile_site_key "";
    include /etc/nginx/snippets/quizonline-frontend-runtime*.conf;

    # --- Frontend (Angular production build) ---
    root /var/www/django_websites/QuizOnline/quizonline-frontend/dist/quizonline-frontend/browser;
    index index.html;

    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html must never be cached — it references hash-named bundles
    # that change every deploy. We also splice in a tiny inline script
    # just before </head> so the Angular bundle picks up the Sentry DSN
    # (and friends) at boot without a frontend rebuild.
    location = /index.html {
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "SAMEORIGIN" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
        add_header Cache-Control             "no-store, no-cache, must-revalidate";
        expires 0;

        # Runtime-injected globals — read by sentry-init.ts. When the
        # variables are empty (no snippet present), the injected script
        # sets them to "" and the SDK init is a no-op.
        sub_filter '</head>' '<script>window.__QUIZONLINE_SENTRY_DSN="$sentry_dsn";window.__QUIZONLINE_SENTRY_ENV="$sentry_env";window.__QUIZONLINE_SENTRY_RELEASE="$sentry_release";window.__QUIZONLINE_TURNSTILE_SITE_KEY="$turnstile_site_key";</script></head>';
        sub_filter_once on;
    }

    # Hashed bundle files (chunk-XXXX.js, styles-XXXX.css, ...) cache forever.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg)$ {
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "SAMEORIGIN" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
        add_header Cache-Control             "public, immutable";
        expires 1y;
        access_log off;
        try_files $uri =404;
    }

    # --- Backend API (gunicorn) ---
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }
    # --- Django admin ---
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Backend static files (admin CSS/JS, DRF browsable API) ---
    location ^~ /static/ {
        alias /var/www/django_websites/QuizOnline/quizonline-server/staticfiles/;
        expires 7d;
        access_log off;
    }

    # --- Media uploads (question images / videos / external assets) ---
    # Uploaded files are content-addressed by sha256, so the URL changes
    # whenever the bytes change — safe to cache aggressively.
    location ^~ /media/ {
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "SAMEORIGIN" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
        add_header Cache-Control             "public, immutable";
        alias /var/www/django_websites/QuizOnline/quizonline-server/media/;
        expires 30d;
        access_log off;
    }
}
