# QuizOnline — nginx reverse proxy
#
# Drop in /etc/nginx/sites-available/quizonline and symlink to
# /etc/nginx/sites-enabled/. Replace YOUR_DOMAIN with the public hostname
# and adjust the certbot cert paths if needed.

# --- HTTP -> HTTPS redirect ---
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    return 301 https://$host$request_uri;
}

# --- HTTPS ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Compression ---
    # Ubuntu's nginx ships ``gzip on`` in the http {} block of
    # /etc/nginx/nginx.conf, but its default ``gzip_types`` is restricted
    # to text/html. We extend it here so Angular bundles, generated CSS,
    # JSON API responses, SVGs and woff2 fonts also get compressed on the
    # wire. Cuts a 180 KB Angular main.js to ~50 KB transferred — visible
    # win on first paint, especially on mobile / high-latency links.
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        application/javascript
        application/json
        application/manifest+json
        application/wasm
        application/xml
        application/rss+xml
        application/atom+xml
        font/woff
        font/woff2
        image/svg+xml
        image/x-icon
        text/css
        text/plain
        text/xml;

    # Brotli compresses better than gzip on textual content (varies by
    # level: ~5 % at brotli_comp_level 5, up to ~20 % at level 11 with
    # the CPU cost that goes with it). The module is shipped as a
    # dynamic nginx filter on Ubuntu 24.04 (noble). Install with:
    #   apt-get install -y libnginx-mod-http-brotli-filter libnginx-mod-http-brotli-static
    #   systemctl reload nginx
    # The package wires a ``load_module`` directive into
    # /etc/nginx/modules-enabled/ automatically — no manual config
    # edit needed for the module itself.
    # Then uncomment the block below. Without the module loaded, the
    # ``brotli`` directive would prevent nginx from starting, so the
    # block ships commented out so this template is safe to apply on
    # a host that hasn't been bootstrapped for brotli yet.
    # See deploy/README.md "Compression" for the full runbook +
    # measured prod numbers.
    # brotli on;
    # brotli_comp_level 5;
    # brotli_min_length 256;
    # brotli_types
    #     application/javascript
    #     application/json
    #     application/manifest+json
    #     application/wasm
    #     application/xml
    #     application/rss+xml
    #     image/svg+xml
    #     image/x-icon
    #     font/woff
    #     font/woff2
    #     text/css
    #     text/plain
    #     text/xml;

    # --- Security headers ---
    # NB: nginx's add_header is NOT inherited the moment a location declares
    # its own add_header. The locations below that need Cache-Control
    # therefore re-emit the security headers via a shared snippet.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # --- Frontend runtime config (injected into index.html via sub_filter) ---
    # Empty defaults so the config is valid even when no Sentry/GlitchTip
    # ingest is configured — the frontend SDK then never even loads.
    # Operator overrides these by dropping
    # /etc/nginx/snippets/quizonline-frontend-runtime.conf
    # with ``set $sentry_dsn "...";`` lines. The glob include below
    # silently tolerates an absent snippet.
    set $sentry_dsn "";
    set $sentry_env "production";
    set $sentry_release "";
    include /etc/nginx/snippets/quizonline-frontend-runtime*.conf;

    # --- Frontend (Angular production build) ---
    root /var/www/django_websites/QuizOnline/quizonline-frontend/dist/quizonline-frontend/browser;
    index index.html;

    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html must never be cached — it references hash-named bundles
    # that change every deploy. We also splice in a tiny inline script
    # just before </head> so the Angular bundle picks up the Sentry DSN
    # (and friends) at boot without a frontend rebuild.
    location = /index.html {
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "SAMEORIGIN" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
        add_header Cache-Control             "no-store, no-cache, must-revalidate";
        expires 0;

        # Runtime-injected globals — read by sentry-init.ts. When the
        # variables are empty (no snippet present), the injected script
        # sets them to "" and the SDK init is a no-op.
        sub_filter '</head>' '<script>window.__QUIZONLINE_SENTRY_DSN="$sentry_dsn";window.__QUIZONLINE_SENTRY_ENV="$sentry_env";window.__QUIZONLINE_SENTRY_RELEASE="$sentry_release";</script></head>';
        sub_filter_once on;
    }

    # Hashed bundle files (chunk-XXXX.js, styles-XXXX.css, ...) cache forever.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg)$ {
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "SAMEORIGIN" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
        add_header Cache-Control             "public, immutable";
        expires 1y;
        access_log off;
        try_files $uri =404;
    }

    # --- Backend API (gunicorn) ---
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Backend health endpoint (gunicorn) ---
    # The Django route is plain ``/health/`` (NOT under ``/api/``), so the
    # SPA's catch-all in ``location /`` would otherwise serve index.html
    # for the same URL and silently break external uptime monitors. The
    # endpoint surfaces DB + cache + celery + outbox checks and returns
    # 503 when ``db`` or ``cache`` fails — perfect for UptimeRobot / Better
    # Stack which only watch for HTTP 200.
    location = /health/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # --- Django admin ---
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Backend static files (admin CSS/JS, DRF browsable API) ---
    # ``^~``: a regex location wins over a plain prefix location in nginx, so
    # without this the ``\.(js|css|...)$`` block above would shadow
    # /static/*.css and /static/*.js and serve them from the frontend root
    # (→ 404, unstyled Django admin). ``^~`` makes nginx use this longest
    # prefix match and SKIP regex evaluation, so backend static is served
    # from staticfiles/. Frontend bundles (/*.js, /*.css) don't start with
    # /static/, so they still hit the regex block and keep immutable caching.
    location ^~ /static/ {
        alias /var/www/django_websites/QuizOnline/quizonline-server/staticfiles/;
        expires 7d;
        access_log off;
    }

    # --- Media uploads (question images / videos / external assets) ---
    # Uploaded files are content-addressed by sha256, so the URL changes
    # whenever the bytes change — safe to cache aggressively.
    # ``^~`` for the same reason as /static/: keep uploaded *.svg (and any
    # other regex-matched extension) served from the media root, not the
    # frontend bundle root.
    location ^~ /media/ {
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "SAMEORIGIN" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
        add_header Cache-Control             "public, immutable";
        alias /var/www/django_websites/QuizOnline/quizonline-server/media/;
        expires 30d;
        access_log off;
    }
}
