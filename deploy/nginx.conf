server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Redirect HTTP -> HTTPS (uncomment after certbot setup)
    # return 301 https://$host$request_uri;

    # --- Frontend (Angular static build) ---
    root /var/www/django_websites/QuizOnline/quizonline-frontend/dist/quizonline-frontend/browser;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Backend API ---
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20M;
    }

    # --- Django admin ---
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Backend static files (admin CSS/JS) ---
    location /static/ {
        alias /var/www/django_websites/QuizOnline/quizonline-server/staticfiles/;
    }

    # --- Media uploads (question images / videos / external assets) ---
    location /media/ {
        alias /var/www/django_websites/QuizOnline/quizonline-server/media/;
        # Cache aggressively — uploaded files are content-addressed via sha256,
        # so the URL changes when the bytes change.
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
