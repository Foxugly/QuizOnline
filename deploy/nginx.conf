# QuizOnline — nginx reverse proxy
#
# Drop in /etc/nginx/sites-available/quizonline and symlink to
# /etc/nginx/sites-enabled/. Replace YOUR_DOMAIN with the public hostname
# and adjust the certbot cert paths if needed.

# --- HTTP -> HTTPS redirect ---
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    return 301 https://$host$request_uri;
}

# --- HTTPS ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Security headers ---
    # NB: nginx's add_header is NOT inherited the moment a location declares
    # its own add_header. The locations below that need Cache-Control
    # therefore re-emit the security headers via a shared snippet.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # --- Frontend (Angular production build) ---
    root /var/www/django_websites/QuizOnline/quizonline-frontend/dist/quizonline-frontend/browser;
    index index.html;

    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html must never be cached — it references hash-named bundles
    # that change every deploy.
    location = /index.html {
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "SAMEORIGIN" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
        add_header Cache-Control             "no-store, no-cache, must-revalidate";
        expires 0;
    }

    # Hashed bundle files (chunk-XXXX.js, styles-XXXX.css, ...) cache forever.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg)$ {
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "SAMEORIGIN" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
        add_header Cache-Control             "public, immutable";
        expires 1y;
        access_log off;
        try_files $uri =404;
    }

    # --- Backend API (gunicorn) ---
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Django admin ---
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Backend static files (admin CSS/JS, DRF browsable API) ---
    location /static/ {
        alias /var/www/django_websites/QuizOnline/quizonline-server/staticfiles/;
        expires 7d;
        access_log off;
    }

    # --- Media uploads (question images / videos / external assets) ---
    # Uploaded files are content-addressed by sha256, so the URL changes
    # whenever the bytes change — safe to cache aggressively.
    location /media/ {
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "SAMEORIGIN" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
        add_header Cache-Control             "public, immutable";
        alias /var/www/django_websites/QuizOnline/quizonline-server/media/;
        expires 30d;
        access_log off;
    }
}
