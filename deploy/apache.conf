<VirtualHost *:80>
    ServerName YOUR_DOMAIN
    # Redirect HTTP -> HTTPS (active after certbot setup)
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

<VirtualHost *:443>
    ServerName YOUR_DOMAIN

    SSLEngine On
    SSLCertificateFile /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem

    # --- Frontend (Angular static build) ---
    DocumentRoot /opt/quizonline/frontend
    <Directory /opt/quizonline/frontend>
        Require all granted
        FallbackResource /index.html
    </Directory>

    # --- Backend API (proxy to gunicorn) ---
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"

    ProxyPass /api/ http://127.0.0.1:8000/api/
    ProxyPassReverse /api/ http://127.0.0.1:8000/api/

    # --- Django admin ---
    ProxyPass /admin/ http://127.0.0.1:8000/admin/
    ProxyPassReverse /admin/ http://127.0.0.1:8000/admin/

    # --- Backend static files (admin CSS/JS) ---
    Alias /static/ /opt/quizonline/backend/staticfiles/
    <Directory /opt/quizonline/backend/staticfiles>
        Require all granted
    </Directory>

    # --- Media uploads ---
    Alias /media/ /opt/quizonline/backend/media/
    <Directory /opt/quizonline/backend/media>
        Require all granted
    </Directory>

    # --- OpenAPI docs ---
    ProxyPass /api/docs/ http://127.0.0.1:8000/api/docs/
    ProxyPassReverse /api/docs/ http://127.0.0.1:8000/api/docs/
    ProxyPass /api/schema/ http://127.0.0.1:8000/api/schema/
    ProxyPassReverse /api/schema/ http://127.0.0.1:8000/api/schema/
</VirtualHost>
