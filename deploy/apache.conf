# QuizOnline — Apache 2 reverse proxy
#
# Drop in /etc/apache2/sites-available/quizonline.conf and enable with
#   sudo a2enmod proxy proxy_http headers rewrite ssl
#   sudo a2ensite quizonline
# Replace YOUR_DOMAIN with the public hostname and adjust the certbot
# cert paths if needed.

# --- HTTP -> HTTPS redirect ---
<VirtualHost *:80>
    ServerName YOUR_DOMAIN

    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

# --- HTTPS ---
<VirtualHost *:443>
    ServerName YOUR_DOMAIN

    SSLEngine On
    SSLCertificateFile    /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem
    Include               /etc/letsencrypt/options-ssl-apache.conf

    LimitRequestBody 20971520

    # --- Frontend (Angular production build) ---
    DocumentRoot /var/www/django_websites/QuizOnline/quizonline-frontend/dist/quizonline-frontend/browser
    <Directory /var/www/django_websites/QuizOnline/quizonline-frontend/dist/quizonline-frontend/browser>
        Require all granted
        FallbackResource /index.html
    </Directory>

    # --- Backend API + admin (proxy to gunicorn) ---
    # Keep /api and /admin out of the FallbackResource path by proxying
    # them before they hit the SPA fallback.
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"

    ProxyPass        /api/   http://127.0.0.1:8000/api/
    ProxyPassReverse /api/   http://127.0.0.1:8000/api/

    ProxyPass        /admin/ http://127.0.0.1:8000/admin/
    ProxyPassReverse /admin/ http://127.0.0.1:8000/admin/

    # --- Backend static files (admin CSS/JS, DRF browsable API) ---
    Alias /static/ /var/www/django_websites/QuizOnline/quizonline-server/staticfiles/
    <Directory /var/www/django_websites/QuizOnline/quizonline-server/staticfiles>
        Require all granted
        Header set Cache-Control "public, max-age=604800"
    </Directory>

    # --- Media uploads (question images / videos / external assets) ---
    # Uploaded files are content-addressed by sha256, so the URL changes
    # whenever the bytes change — safe to cache aggressively.
    Alias /media/ /var/www/django_websites/QuizOnline/quizonline-server/media/
    <Directory /var/www/django_websites/QuizOnline/quizonline-server/media>
        Require all granted
        Header set Cache-Control "public, max-age=2592000, immutable"
    </Directory>
</VirtualHost>
