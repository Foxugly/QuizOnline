      description: 'Exécute l''action (`approve` ou `reject`) encodée dans le token.
        Le clic depuis le mail compte comme une décision explicite : si la demande
        avait déjà été tranchée (côté app ou autre mail), la nouvelle décision écrase
        l''ancienne (last-decision-wins), avec un renvoi de mail à l''utilisateur
