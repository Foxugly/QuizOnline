  /api/domain/join-request/decide/{token}/:
    get:
      operationId: domain_join_request_decide_retrieve
      description: |-
        Décode le token signé envoyé par mail, vérifie que l'utilisateur connecté en est bien le destinataire, et renvoie l'état courant de la demande pour que le frontend puisse afficher un récapitulatif avant exécution.

