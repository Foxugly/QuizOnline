            type: string
            format: email
            minLength: 1
          maxItems: 50
          minItems: 1
        language:
          type: string
          minLength: 1
          default: en
          maxLength: 8
        additional_domain_ids:
          type: array
          items:
            type: integer
            minimum: 1
          maxItems: 20
      required:
      - emails
