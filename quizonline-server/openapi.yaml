openapi: 3.0.3
info:
  title: QuizOnline API
  version: 1.0.0
paths:
  /api/admin/system-check/:
    post:
      operationId: admin_system_check_create
      summary: Lancer un check systeme
      tags:
      - Admin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemCheckRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SystemCheckRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SystemCheckRequestRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemCheckResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Validation error
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Unauthorized
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Forbidden (admin only)
  /api/admin/system-config/:
    get:
      operationId: admin_system_config_retrieve
      summary: Lire la configuration systeme effective
      tags:
      - Admin
      security:
      - jwtAuth: []
      responses:
        '200':
          description: System configuration snapshot
  /api/auth/magic-link/exchange/:
    post:
      operationId: auth_magic_link_exchange_create
      description: Valide la signature et la TTL du token, vérifie que l'utilisateur
        est actif et a confirmé son e-mail, puis émet une paire access / refresh comme
        l'endpoint password classique.
      summary: Échanger un token magique contre une paire JWT
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MagicLinkExchangeRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MagicLinkExchangeRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MagicLinkExchangeRequestRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MagicLinkExchangeResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: ''
        '410':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: ''
  /api/auth/magic-link/request/:
    post:
      operationId: auth_magic_link_request_create
      description: Envoie un lien de connexion par e-mail si un compte actif et confirmé
        existe pour cette adresse. Réponse identique dans tous les cas pour ne pas
        divulguer l'existence d'un compte.
      summary: Demander un lien magique de connexion
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MagicLinkRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MagicLinkRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MagicLinkRequestRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: ''
  /api/domain/:
    get:
      operationId: domain_list
      description: |-
        Retourne la liste des domaines visibles par l'utilisateur courant.

        - **Superuser / staff global** : voit tous les domaines
        - **Utilisateur normal** : voit uniquement les domaines dont il est `owner` ou membre de `staff`
      summary: Lister les domaines accessibles
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Domain
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDomainReadList'
          description: ''
    post:
      operationId: domain_create
      description: |-
        Crée un nouveau domaine.

        - `owner` est forcé au user courant (même si fourni dans le payload).
        - Le user courant est ajouté à `staff` automatiquement.
        - `allowed_languages` doit être un sous-ensemble de `settings.LANGUAGES`.
      summary: Créer un domaine
      tags:
      - Domain
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DomainWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DomainWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DomainWriteRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainRead'
          description: ''
        '400':
          description: Validation error.
        '401':
          description: Authentication required.
  /api/domain/{domain_id}/:
    get:
      operationId: domain_retrieve
      description: |-
        Retourne un domaine (par `domain_id`).

        ⚠️ Si l'utilisateur n'a pas accès au domaine, l'API renvoie généralement **404** (car `get_queryset()` ne retourne pas l'objet).
      summary: Récupérer un domaine
      parameters:
      - in: path
        name: domain_id
        schema:
          type: integer
        description: Identifiant du domaine (correspond à `<int:domain_id>` dans l'URL).
        required: true
      tags:
      - Domain
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainRead'
          description: ''
        '404':
          description: Not found (domain non visible ou inexistant).
    put:
      operationId: domain_update
      description: |-
        Met à jour un domaine (PUT).

        - Réservé à : superuser / staff global / owner / staff du domaine.
        - `owner` est **read-only** (ne peut pas être modifié via l'API).
      summary: Mettre à jour un domaine
      parameters:
      - in: path
        name: domain_id
        schema:
          type: integer
        description: Identifiant du domaine (correspond à `<int:domain_id>` dans l'URL).
        required: true
      tags:
      - Domain
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DomainWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DomainWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DomainWriteRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainRead'
          description: ''
        '400':
          description: Validation error.
        '401':
          description: Authentication required.
        '403':
          description: Forbidden.
        '404':
          description: Not found (domain non visible ou inexistant).
    patch:
      operationId: domain_partial_update
      description: |-
        Met à jour partiellement un domaine (PATCH).

        - Réservé à : superuser / staff global / owner / staff du domaine.
        - `owner` est **read-only** (ne peut pas être modifié via l'API).
      summary: Modifier partiellement un domaine
      parameters:
      - in: path
        name: domain_id
        schema:
          type: integer
        description: Identifiant du domaine (correspond à `<int:domain_id>` dans l'URL).
        required: true
      tags:
      - Domain
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedDomainPartialRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedDomainPartialRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedDomainPartialRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainRead'
          description: ''
        '400':
          description: Validation error.
        '401':
          description: Authentication required.
        '403':
          description: Forbidden.
        '404':
          description: Not found (domain non visible ou inexistant).
    delete:
      operationId: domain_destroy
      description: |-
        Supprime un domaine.

        - Réservé à : superuser / staff global / owner / staff du domaine.
        ⚠️ La suppression peut échouer si le domaine est référencé ailleurs (FK en PROTECT côté modèles liés).
      summary: Supprimer un domaine
      parameters:
      - in: path
        name: domain_id
        schema:
          type: integer
        description: Identifiant du domaine (correspond à `<int:domain_id>` dans l'URL).
        required: true
      tags:
      - Domain
      security:
      - jwtAuth: []
      responses:
        '204':
          description: Deleted.
        '401':
          description: Authentication required.
        '403':
          description: Forbidden.
        '404':
          description: Not found (domain non visible ou inexistant).
  /api/domain/{domain_id}/analytics/:
    get:
      operationId: domain_analytics_retrieve
      description: |-
        Counts par statut, taux d'acceptation, délai médian de décision et top des modérateurs. Accessible aux owner / managers du domaine (via la queryset scope habituelle).

        Le paramètre ``range`` (``7d``, ``30d``, ``90d`` ou ``all``, défaut ``all``) restreint les statistiques de décision (approuvées, refusées, taux, médiane, top) à la fenêtre demandée. ``pending_count`` et ``cancelled_count`` restent toujours des instantanés courants.
      summary: Statistiques de modération pour un domaine
      parameters:
      - in: path
        name: domain_id
        schema:
          type: integer
        description: A unique integer value identifying this domain.
        required: true
      - in: query
        name: range
        schema:
          type: string
          enum:
          - 30d
          - 7d
          - 90d
          - all
        description: 'Time window for decision stats: 7d | 30d | 90d | all (default
          all).'
      tags:
      - Domain
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainAnalytics'
          description: ''
  /api/domain/{domain_id}/analytics/export/:
    get:
      operationId: domain_analytics_export_retrieve
      description: Renvoie un CSV (UTF-8, en-tête sur la première ligne) résumant
        les statistiques du domaine pour la fenêtre demandée. Honore le paramètre
        ``range`` comme l'endpoint JSON. Idéal pour reporting hors-app.
      summary: Export CSV des statistiques de modération
      parameters:
      - in: path
        name: domain_id
        schema:
          type: integer
        description: A unique integer value identifying this domain.
        required: true
      - in: query
        name: range
        schema:
          type: string
          enum:
          - 30d
          - 7d
          - 90d
          - all
        description: 'Time window: 7d | 30d | 90d | all (default all).'
      tags:
      - Domain
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: string
                format: binary
          description: ''
  /api/domain/{domain_id}/audit/:
    get:
      operationId: domain_audit_list
      description: |-
        Liste paginée des dernières actions administratives sur le domaine. Réservée aux owner / managers / superusers (la queryset du viewset gère déjà la confidentialité).

        Filtres optionnels (combinables) :
        - ``action`` : nom exact de l'action (ex. ``member.promote``).
        - ``actor`` : sous-chaîne, insensible à la casse, recherchée dans le ``username`` ou l'``email`` de l'acteur.
        - ``since`` / ``until`` : ISO-8601 (date ou datetime) sur ``created_at``.
      summary: Journal d'audit d'un domaine
      parameters:
      - in: query
        name: action
        schema:
          type: string
        description: Exact match on the action name.
      - in: query
        name: actor
        schema:
          type: string
        description: Case-insensitive substring on the actor username or email.
      - in: path
        name: domain_id
        schema:
          type: integer
        description: A unique integer value identifying this domain.
        required: true
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: since
        schema:
          type: string
          format: date-time
        description: ISO-8601 lower bound (inclusive) on created_at.
      - in: query
        name: until
        schema:
          type: string
          format: date-time
        description: ISO-8601 upper bound (inclusive) on created_at.
      tags:
      - Domain
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDomainAuditLogReadList'
          description: ''
  /api/domain/{domain_id}/audit/actions/:
    get:
      operationId: domain_audit_actions_retrieve
      description: Liste triée et dédupliquée des valeurs ``action`` déjà enregistrées
        sur ce domaine. Sert à alimenter le filtre « action » de la page d'audit sans
        hardcoder la liste côté client.
      summary: Actions distinctes journalisées sur un domaine
      parameters:
      - in: path
        name: domain_id
        schema:
          type: integer
        description: A unique integer value identifying this domain.
        required: true
      tags:
      - Domain
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/domain/{domain_id}/details/:
    get:
      operationId: domain_details_retrieve
      summary: Récupérer un domaine avec détails
      parameters:
      - in: path
        name: domain_id
        schema:
          type: integer
        description: ID du domaine.
        required: true
      tags:
      - Domain
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainDetail'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Not found
  /api/domain/{domain_id}/invitations/:
    get:
      operationId: domain_invitations_list
      summary: Lister les invitations en attente sur un domaine
      parameters:
      - in: path
        name: domain_id
        schema:
          type: integer
        description: A unique integer value identifying this domain.
        required: true
      tags:
      - Domain
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DomainInviteRead'
          description: ''
  /api/domain/{domain_id}/invitations/{invite_id}/resend/:
    post:
      operationId: domain_invitations_resend_create
      description: 'Refresh ``last_sent_at`` + ``expires_at`` du row pending et réémet
        l''e-mail avec un nouveau token signé. Idempotent : la ligne reste la même,
        seule la date d''envoi change.'
      summary: Renvoyer une invitation existante
      parameters:
      - in: path
        name: domain_id
        schema:
          type: integer
        description: A unique integer value identifying this domain.
        required: true
      - in: path
        name: invite_id
        schema:
          type: string
          pattern: ^[0-9]+$
        required: true
      tags:
      - Domain
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainInviteRead'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: ''
  /api/domain/{domain_id}/invitations/{invite_id}/revoke/:
    post:
      operationId: domain_invitations_revoke_create
      description: 'Marque l''invitation ``revoked`` : le token déjà émis ne matche
        plus la table, le destinataire ne peut plus l''utiliser.'
      summary: Révoquer une invitation en attente
      parameters:
      - in: path
        name: domain_id
        schema:
          type: integer
        description: A unique integer value identifying this domain.
        required: true
      - in: path
        name: invite_id
        schema:
          type: string
          pattern: ^[0-9]+$
        required: true
      tags:
      - Domain
      security:
      - jwtAuth: []
      responses:
        '204':
          description: Revoked.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: ''
  /api/domain/{domain_id}/invite/:
    post:
      operationId: domain_invite_create
      description: |-
        Envoie une invitation signée à chaque adresse de la liste. Le destinataire suivra un lien qui pointe sur la page d'acceptation frontend ; aucun objet d'invitation n'est créé côté DB (le token est l'invitation).

        Accessible aux owners et aux managers du domaine.
      summary: Inviter un ou plusieurs utilisateurs par e-mail
      parameters:
      - in: path
        name: domain_id
        schema:
          type: integer
        description: A unique integer value identifying this domain.
        required: true
      tags:
      - Domain
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DomainInviteRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DomainInviteRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DomainInviteRequestRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DomainInviteResult'
          description: ''
  /api/domain/{domain_id}/join-request/:
    get:
      operationId: domain_join_request_list
      description: Nested under /api/domain/{domain_id}/join-request/.
      parameters:
      - in: path
        name: domain_id
        schema:
          type: integer
        required: true
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - domain
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDomainJoinRequestReadList'
          description: ''
    post:
      operationId: domain_join_request_create
      description: Nested under /api/domain/{domain_id}/join-request/.
      parameters:
      - in: path
        name: domain_id
        schema:
          type: integer
        required: true
      tags:
      - domain
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainJoinRequestRead'
          description: ''
  /api/domain/{domain_id}/join-request/{req_id}/:
    get:
      operationId: domain_join_request_retrieve
      description: Nested under /api/domain/{domain_id}/join-request/.
      parameters:
      - in: path
        name: domain_id
        schema:
          type: integer
        required: true
      - in: path
        name: req_id
        schema:
          type: integer
        required: true
      tags:
      - domain
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainJoinRequestRead'
          description: ''
  /api/domain/{domain_id}/join-request/{req_id}/approve/:
    post:
      operationId: domain_join_request_approve_create
      description: Nested under /api/domain/{domain_id}/join-request/.
      parameters:
      - in: path
        name: domain_id
        schema:
          type: integer
        required: true
      - in: path
        name: req_id
        schema:
          type: integer
        required: true
      tags:
      - domain
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainJoinRequestRead'
          description: ''
  /api/domain/{domain_id}/join-request/{req_id}/cancel/:
    post:
      operationId: domain_join_request_cancel_create
      description: |-
        Cancel a pending join request.

        Two intentional design choices that should NOT be "fixed":

        1. No `transaction.atomic` / `select_for_update`. Cancellation is a
           monotonic single-column write (pending → cancelled) with no side
           effects. Two concurrent cancels collapse to the same terminal
           state — idempotent at the row level. An approve-vs-cancel race
           is last-write-wins by design (the HTTP client that lost the race
           observes the final state on next fetch).

        2. The approver gate (`_check_can_approve`) is intentionally NOT
           reused here. Cancellation is a requester-only action: only the
           user who created the request (or a superuser) can cancel it.
           The domain owner can approve and reject, but cannot cancel
           someone else's request — that's a different concept.
      parameters:
      - in: path
        name: domain_id
        schema:
          type: integer
        required: true
      - in: path
        name: req_id
        schema:
          type: integer
        required: true
      tags:
      - domain
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainJoinRequestRead'
          description: ''
  /api/domain/{domain_id}/join-request/{req_id}/reject/:
    post:
      operationId: domain_join_request_reject_create
      description: Nested under /api/domain/{domain_id}/join-request/.
      parameters:
      - in: path
        name: domain_id
        schema:
          type: integer
        required: true
      - in: path
        name: req_id
        schema:
          type: integer
        required: true
      tags:
      - domain
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainJoinRequestRead'
          description: ''
  /api/domain/{domain_id}/join-request/bulk-approve/:
    post:
      operationId: domain_join_request_bulk_approve_create
      description: Nested under /api/domain/{domain_id}/join-request/.
      summary: Approuver plusieurs demandes en une requête
      parameters:
      - in: path
        name: domain_id
        schema:
          type: integer
        required: true
      tags:
      - Domain
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DomainJoinRequestBulkApproveRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DomainJoinRequestBulkApproveRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DomainJoinRequestBulkApproveRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainJoinRequestBulkResult'
          description: ''
  /api/domain/{domain_id}/join-request/bulk-reject/:
    post:
      operationId: domain_join_request_bulk_reject_create
      description: Nested under /api/domain/{domain_id}/join-request/.
      summary: Refuser plusieurs demandes en une requête
      parameters:
      - in: path
        name: domain_id
        schema:
          type: integer
        required: true
      tags:
      - Domain
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DomainJoinRequestBulkRejectRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DomainJoinRequestBulkRejectRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DomainJoinRequestBulkRejectRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainJoinRequestBulkResult'
          description: ''
  /api/domain/{domain_id}/leave/:
    post:
      operationId: domain_leave_create
      description: |-
        L'utilisateur connecté se retire du domaine. Refuse :

        - si l'utilisateur est le owner (il doit d'abord transférer la propriété) ;
        - si l'utilisateur n'est pas membre du domaine.

        Tout statut de manager est aussi retiré. Idempotent au niveau
        du M2M (`remove` sur un non-membre est un no-op).
      summary: Quitter le domaine (action volontaire de l'utilisateur)
      parameters:
      - in: path
        name: domain_id
        schema:
          type: integer
        description: A unique integer value identifying this domain.
        required: true
      tags:
      - Domain
      security:
      - jwtAuth: []
      responses:
        '204':
          description: Quitté.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: ''
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: ''
  /api/domain/{domain_id}/member-role/:
    post:
      operationId: domain_member_role_create
      description: 'Trois intentions exclusives selon le payload : ``is_domain_manager``
        (promouvoir / rétrograder), ``is_active`` (toggle global avec garde-fous),
        ``remove_member`` (retirer du domaine, scope local).'
      summary: Modifier le rôle d'un membre
      parameters:
      - in: path
        name: domain_id
        schema:
          type: integer
        description: A unique integer value identifying this domain.
        required: true
      tags:
      - Domain
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DomainMemberRoleRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DomainMemberRoleRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DomainMemberRoleRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/domain/{domain_id}/transfer/:
    post:
      operationId: domain_transfer_create
      description: |-
        Le propriétaire envoie une proposition de transfert au futur propriétaire désigné par ``user_id``. Un e-mail signé est envoyé : tant que le destinataire n'a pas cliqué le lien et confirmé, la propriété ne change pas.

        Refusé si l'appelant n'est pas le propriétaire actuel, ou si la cible est elle-même déjà le propriétaire.
      summary: Initier un transfert de propriété
      parameters:
      - in: path
        name: domain_id
        schema:
          type: integer
        description: A unique integer value identifying this domain.
        required: true
      tags:
      - Domain
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DomainTransferRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DomainTransferRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DomainTransferRequestRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '202':
          description: Transfer email queued.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: ''
  /api/domain/available-for-linking/:
    get:
      operationId: domain_available_for_linking_retrieve
      tags:
      - domain
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainWrite'
          description: ''
  /api/domain/invite/accept/{token}/:
    get:
      operationId: domain_invite_accept_retrieve
      description: |-
        Décode le lien d'invitation reçu par mail et renvoie l'état du destinataire vis-à-vis du domaine : prêt à accepter, doit se connecter, doit s'inscrire, etc.

        Endpoint public : la page d'acceptation est volontairement accessible avant l'authentification pour pouvoir orienter le visiteur vers la bonne action (login / signup).
      summary: Décoder un token d'invitation
      parameters:
      - in: path
        name: token
        schema:
          type: string
        required: true
      tags:
      - Domain
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainInviteState'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: ''
        '410':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: ''
    post:
      operationId: domain_invite_accept_create
      description: Ajoute l'utilisateur connecté aux membres du domaine si son adresse
        e-mail correspond à celle encodée dans le token. Sinon renvoie 403 ``wrong_account``
        — l'invitation reste valide pour le bon compte jusqu'à expiration.
