<p-card>
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    @if (error()) {
      <p class="field-error">{{ error() }}</p>
    }

    <div class="field">
      <label for="title">Titre</label>
      <input formControlName="title" id="title" pInputText type="text" />
    </div>

    <div class="field">
      <label for="domain">Domaine</label>
      <p-select
        formControlName="domain_id"
        [options]="domainOptions"
        optionLabel="name"
        optionValue="code"
        appendTo="body"
        id="domain"
        placeholder="Choisir un domaine">
      </p-select>
    </div>

    <div class="field">
      <label for="subjects">Sujets</label>
      <p-multiSelect
        formControlName="subject_ids"
        [options]="subjectOptions"
        [showClear]="true"
        class="w-full"
        id="subjects"
        optionLabel="name"
        optionValue="code"
        (onChange)="onChangeSubjects()"
        [panelStyle]="{ 'max-height': '250px', 'overflow-y': 'auto' }"
        placeholder="Choisir un ou plusieurs sujets">
      </p-multiSelect>
    </div>

    <div class="field">
      <label for="nbQuestions">Nombre de questions <span *ngIf="maxQuestions"> (max: {{ maxQuestions }})</span></label>
      <p-inputNumber
        formControlName="max_questions"
        [max]="100"
        [min]="1"
        [showButtons]="true"
        id="nbQuestions">
      </p-inputNumber>
    </div>

    <div class="field field--inline">
      <label>
        <p-checkbox [binary]="true" formControlName="with_duration"></p-checkbox>
        Timer activé
      </label>
    </div>

    <div class="field">
      <label for="timer">Timer (in minutes)</label>
      <p-inputNumber
        formControlName="duration"
        [max]="120"
        [min]="1"
        [showButtons]="true"
        id="timer">
      </p-inputNumber>
    </div>
  </form>
</p-card>
