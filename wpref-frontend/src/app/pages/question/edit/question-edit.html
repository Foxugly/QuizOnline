<div class="page">
  <div class="question__header">
    <div class="header-left">
      <p-button
        (onClick)="goBack()"
        icon="pi pi-arrow-left"
        label="Retour"
        severity="secondary"
        text
        type="button">
      </p-button>
    </div>

    <h1 class="header-title">Modifier une question</h1>

    <div class="header-right">
      <p-button
        (onClick)="goView(id)"
        icon="pi pi-eye"
        label="Voir"
        severity="secondary"
        type="button">
      </p-button>
    </div>
  </div>

  @if (error()) {
    <div class="error">
      {{ error() }}
    </div>
  }

  @if (success()) {
    <div class="success">
      {{ success() }}
    </div>
  }

  @if (loading()) {
    <div class="status-card">Chargement...</div>
  } @else if (question(); as q) {
    <app-question-editor-form
      [activeLang]="activeLang()"
      [domainReadonlyLabel]="getDomainLabel(q.domain)"
      [emptyLanguagesMessage]="emptyLanguagesMessage"
      [form]="form"
      [deleting]="deleting()"
      [saving]="saving()"
      [showDeleteAction]="true"
      [showDomainSelect]="false"
      [showTranslateAction]="false"
      [subjectOptions]="subjectOptions()"
      [submitError]="submitError()"
      submitLabel="Enregistrer"
      [tabCodes]="tabCodes()"
      [translating]="false"
      (addOptionClicked)="addOption()"
      (cancelClicked)="goBack()"
      (deleteClicked)="deleteQuestion()"
      (removeOptionClicked)="removeOption($event)"
      (submitted)="save()"
      (tabChanged)="onTabChange($event)">
    </app-question-editor-form>
  }
</div>
