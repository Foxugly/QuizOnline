<div class="page">
  <div class="header-line header-line--grid">
    <div class="header-spacer"></div>

    <div class="header-center">
      <h1 class="title">Cr&#233;er une question</h1>
      <p class="subtitle muted">Domaine, sujets, traductions et reponses</p>
    </div>

    <div class="header-actions">
      <p-button
        (onClick)="goBack()"
        icon="pi pi-arrow-left"
        label="Retour"
        severity="secondary"
        type="button">
      </p-button>
    </div>
  </div>

  @if (loading()) {
    <div class="card">
      <p class="muted">Chargement...</p>
    </div>
  } @else {
    @if (error()) {
      <div class="card">
        <div class="alert alert--error">{{ error() }}</div>
      </div>
    }

    <app-question-editor-form
      [activeLang]="activeLang()"
      [domainOptions]="domainOptions()"
      [emptyLanguagesMessage]="emptyLanguagesMessage"
      [form]="form"
      [practiceTooltip]="practiceTooltip"
      [saving]="saving()"
      [showDomainSelect]="true"
      [showTranslateAction]="true"
      [subjectOptions]="subjectOptions()"
      [submitError]="submitError()"
      submitLabel="Cr&#233;er"
      [tabCodes]="tabCodes()"
      [translating]="translating()"
      (addOptionClicked)="addOption()"
      (cancelClicked)="goBack()"
      (removeOptionClicked)="removeOption($event)"
      (submitted)="save()"
      (tabChanged)="onTabChange($event)"
      (translateActive)="translateFromActiveTab()">
    </app-question-editor-form>
  }
</div>
