<div class="page">
  <div class="header-line header-line--grid">
    <div class="header-spacer"></div>

    <div class="header-center">
      <h1 class="title">&#201;diter le sujet</h1>
      <p class="subtitle muted">Traductions et contenu</p>
    </div>

    <div class="header-actions">
      <p-button
        (onClick)="goList()"
        icon="pi pi-arrow-left"
        label="Retour"
        severity="secondary"
        type="button">
      </p-button>

      <p-button
        (onClick)="save()"
        icon="pi pi-save"
        label="Enregistrer"
        type="button">
      </p-button>
    </div>
  </div>

  @if (loading()) {
    <div class="card">
      <p class="muted">Chargement...</p>
    </div>
  } @else {
    <app-subject-editor-form
      [activeLang]="activeLang()"
      [form]="form"
      [loading]="loading()"
      [showDomainSelect]="false"
      [submitError]="submitError()"
      submitLabel="Enregistrer"
      [tabCodes]="tabCodes()"
      [translating]="translating()"
      (cancel)="goList()"
      (submitForm)="save()"
      (tabChange)="onTabChange($event)"
      (translateActive)="translateFromActiveTab()">
    </app-subject-editor-form>

    <div class="card">
      <div class="card-head">
        <h2 class="card-title">Questions</h2>
        <div class="header-actions">
          <p-button
            (onClick)="goQuestionNew()"
            icon="pi pi-plus"
            label="Ajouter"
            severity="primary"
            type="button">
          </p-button>
        </div>
      </div>

      @if ((questions() || []).length === 0) {
        <p class="muted empty-state">Aucune question.</p>
      } @else {
        <p-table
          [value]="questions()"
          showGridlines
          size="small"
          stripedRows
          styleClass="table">
          <ng-template #header>
            <tr>
              <th>Titre</th>
              <th class="col-actions">Actions</th>
            </tr>
          </ng-template>

          <ng-template #body let-q>
            <tr>
              <td class="truncate">{{ getQuestionTitle(q) }}</td>
              <td class="col-actions">
                <div class="row-actions">
                  <p-button
                    (onClick)="goQuestionEdit(q.id)"
                    icon="pi pi-pencil"
                    severity="info"
                    size="small"
                    type="button">
                  </p-button>
                  <p-button
                    (onClick)="goQuestionDelete(q.id)"
                    icon="pi pi-trash"
                    severity="danger"
                    size="small"
                    type="button">
                  </p-button>
                </div>
              </td>
            </tr>
          </ng-template>
        </p-table>
      }
    </div>
  }
</div>
