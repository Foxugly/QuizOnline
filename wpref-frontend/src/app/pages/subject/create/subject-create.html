<div class="page">
  <div class="header-line header-line--grid">
    <div class="header-spacer"></div>

    <div class="header-center">
      <h1 class="title">Cr&#233;er un sujet</h1>
      <p class="subtitle muted">Choix du domaine + traductions</p>
    </div>

    <div class="header-actions">
      <p-button
        (onClick)="goList()"
        icon="pi pi-arrow-left"
        label="Retour"
        severity="secondary"
        type="button">
      </p-button>
    </div>
  </div>

  @if (loading()) {
    <div class="card">
      <p class="muted">Chargement...</p>
    </div>
  } @else {
    <app-subject-editor-form
      [activeLang]="activeLang()"
      [domainOptions]="domainOptions()"
      [emptyLanguagesMessage]="emptyLanguagesMessage"
      [form]="form"
      [loading]="loading()"
      [selectedDomainId]="selectedDomainId()"
      [showDomainSelect]="true"
      [submitError]="submitError()"
      submitLabel="Cr&#233;er"
      [tabCodes]="tabCodes()"
      [translating]="translating()"
      (cancel)="goList()"
      (domainChange)="onDomainChange($event)"
      (submitForm)="submit()"
      (tabChange)="onTabChange($event)"
      (translateActive)="translateFromActiveTab()">
    </app-subject-editor-form>
  }
</div>
