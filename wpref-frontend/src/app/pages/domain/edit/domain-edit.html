<div class="page">
  <div class="header-line header-line--grid">
    <div class="header-spacer"></div>

    <div class="header-center">
      <h1 class="title">&#201;diter le domaine</h1>
      <p class="subtitle muted">Traductions, statut et acc&#232;s</p>
    </div>

    <div class="header-actions">
      <p-button
        (onClick)="goList()"
        icon="pi pi-arrow-left"
        label="Retour"
        severity="secondary"
        type="button">
      </p-button>

      <p-button
        (onClick)="save()"
        icon="pi pi-save"
        label="Enregistrer"
        type="button">
      </p-button>
    </div>
  </div>

  @if (loading()) {
    <div class="card">
      <p class="muted">Chargement...</p>
    </div>
  } @else {
    <app-domain-editor-form
      [activeTab]="activeTab()"
      [availableStaff]="availableStaff()"
      [form]="form"
      [langCodeOptions]="langCodeOptions()"
      [ownerOptions]="ownerOptions()"
      [ownerPlaceholder]="'Choisir un owner'"
      [ownerReadonly]="false"
      [selectedStaff]="selectedStaff()"
      [submitError]="submitError()"
      submitLabel="Enregistrer"
      [tabCodes]="tabCodes()"
      [titleLabel]="'Nom'"
      [translating]="translating()"
      (cancel)="goList()"
      (staffPickListChange)="onStaffPickListChange()"
      (submitForm)="save()"
      (tabValueChange)="onTabValueChange($event)"
      (translateClick)="translateFrom($event)">
    </app-domain-editor-form>
  }
</div>
