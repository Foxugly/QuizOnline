name: Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

permissions:
  id-token: write    # required for OIDC token minting
  contents: read

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production    # gates the OIDC sub claim AND enables approval rules
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: quizonline-frontend/package-lock.json

      - name: Build frontend
        run: |
          cd quizonline-frontend
          npm ci
          npx ng build --configuration=production

      - name: Package frontend build
        id: package
        run: |
          tar -czf frontend-build.tar.gz -C quizonline-frontend/dist/quizonline-frontend/browser .
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: gh-actions-${{ github.run_id }}

      - name: Upload bundle to S3
        run: |
          aws s3 cp frontend-build.tar.gz \
            "s3://${{ secrets.S3_DEPLOY_BUCKET }}/builds/${{ steps.package.outputs.sha }}.tar.gz"

      - name: Trigger deploy on EC2 via SSM
        id: ssm
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          BUCKET: ${{ secrets.S3_DEPLOY_BUCKET }}
          SHA: ${{ steps.package.outputs.sha }}
        run: |
          # Ordered SSM commands (AWS-RunShellScript runs them as ROOT):
          #   1. chown the whole tree back to django:www-data. Runs BEFORE the
          #      django git reset and self-heals the recurring ".git/objects …
          #      Permission denied" failure caused by git objects left
          #      root-owned during manual ops on the box.
          #   2. As django, with ``umask 027``: fetch + hard-reset to
          #      origin/main. The umask makes every file git recreates be born
          #      640/750 (group www-data) instead of world-readable 644 — this
          #      is what stops the per-deploy permission drift at the source
          #      (a bare reset under the default umask 022 recreated ~1500
          #      files as 644 every deploy). Also refreshes the origin/main
          #      ref used by step 3.
          #   3. As ROOT: install every systemd unit straight from the
          #      COMMITTED git blob at origin/main — never from the
          #      django-writable working tree. A compromised ``django`` can
          #      therefore not place or alter a root-run unit (closes the
          #      cp-unit → daemon-reload → restart → root-RCE escalation).
          #      ``-c safe.directory`` silences git's dubious-ownership guard
          #      now that the repo is owned by django, not root.
          #   4. daemon-reload + (re)start the frontend-runtime fetch unit.
          #   5. As ROOT: install the nginx site config from the COMMITTED git
          #      blob → /etc/nginx/sites-available/…, validate with ``nginx
          #      -t``, and ONLY reload if valid — otherwise restore the prior
          #      config and fail the deploy (the live config is never left
          #      broken). Same airtight git-blob pattern as the units: the
          #      served config is version-controlled and re-synced every
          #      deploy, so manual edits on the box are reverted on the next
          #      deploy — change deploy/nginx/quizonline.foxugly.com.conf in
          #      the repo, not the box.
          #   6. As django: run ssm-deploy.sh (restart app services via the
          #      tight sudoers grant + atomic frontend bundle swap).
          #   7. FINAL idempotent normalization (root, AFTER everything that
          #      writes to the tree — git reset, collectstatic, bundle swap):
          #      chown then ``chmod -R g-w,o-rwx`` so the whole tree ends at
          #      750 dirs / 640 files, group www-data, no other-access, no
          #      group-write. Serving-safe: django's primary group AND nginx
          #      both run as www-data, so nginx reads bundle/static/media via
          #      the group (verified: id django → gid=33(www-data)); nothing
          #      relied on world-read. ``g-w,o-rwx`` preserves execute bits.
          #      Runs as root in this SSM context — no new django sudo grant.
          #
          # JSON quoting is fiddly — use a tmpfile so the YAML stays
          # readable and ``aws ssm`` doesn't see escaped-double-quote
          # soup on the command line.
          cat > /tmp/ssm-params.json <<EOF
          {
            "commands": [
              "chown -R django:www-data /var/www/django_websites/QuizOnline",
              "sudo -u django bash -c 'umask 027; cd /var/www/django_websites/QuizOnline && git fetch --quiet && git reset --hard --quiet origin/main'",
              "git -C /var/www/django_websites/QuizOnline -c safe.directory=/var/www/django_websites/QuizOnline show origin/main:deploy/quizonline-env-fetch.service > /etc/systemd/system/quizonline-env-fetch.service",
              "git -C /var/www/django_websites/QuizOnline -c safe.directory=/var/www/django_websites/QuizOnline show origin/main:deploy/quizonline-frontend-runtime-fetch.service > /etc/systemd/system/quizonline-frontend-runtime-fetch.service",
              "git -C /var/www/django_websites/QuizOnline -c safe.directory=/var/www/django_websites/QuizOnline show origin/main:deploy/quizonline-gunicorn.service > /etc/systemd/system/quizonline-gunicorn.service",
              "git -C /var/www/django_websites/QuizOnline -c safe.directory=/var/www/django_websites/QuizOnline show origin/main:deploy/quizonline-celery.service > /etc/systemd/system/quizonline-celery.service",
              "git -C /var/www/django_websites/QuizOnline -c safe.directory=/var/www/django_websites/QuizOnline show origin/main:deploy/quizonline-celery-beat.service > /etc/systemd/system/quizonline-celery-beat.service",
              "git -C /var/www/django_websites/QuizOnline -c safe.directory=/var/www/django_websites/QuizOnline show origin/main:deploy/quizonline-geoip-fetch.service > /etc/systemd/system/quizonline-geoip-fetch.service",
              "git -C /var/www/django_websites/QuizOnline -c safe.directory=/var/www/django_websites/QuizOnline show origin/main:deploy/fetch-env-from-ssm.sh > /usr/local/sbin/quizonline-env-fetch.sh && chmod 0755 /usr/local/sbin/quizonline-env-fetch.sh && chown root:root /usr/local/sbin/quizonline-env-fetch.sh",
              "git -C /var/www/django_websites/QuizOnline -c safe.directory=/var/www/django_websites/QuizOnline show origin/main:deploy/fetch-frontend-runtime-from-ssm.sh > /usr/local/sbin/quizonline-frontend-runtime-fetch.sh && chmod 0755 /usr/local/sbin/quizonline-frontend-runtime-fetch.sh && chown root:root /usr/local/sbin/quizonline-frontend-runtime-fetch.sh",
              "git -C /var/www/django_websites/QuizOnline -c safe.directory=/var/www/django_websites/QuizOnline show origin/main:deploy/fetch-geoip-from-ssm.sh > /usr/local/sbin/quizonline-geoip-fetch.sh && chmod 0755 /usr/local/sbin/quizonline-geoip-fetch.sh && chown root:root /usr/local/sbin/quizonline-geoip-fetch.sh",
              "systemctl daemon-reload",
              "systemctl enable --quiet quizonline-frontend-runtime-fetch.service",
              "systemctl restart quizonline-frontend-runtime-fetch.service",
              "bash -c 'set -e; git -C /var/www/django_websites/QuizOnline -c safe.directory=/var/www/django_websites/QuizOnline show origin/main:deploy/nginx/quizonline.foxugly.com.conf > /etc/nginx/sites-available/quizonline.foxugly.com.new; cp -a /etc/nginx/sites-available/quizonline.foxugly.com /etc/nginx/sites-available/quizonline.foxugly.com.deploybak; mv /etc/nginx/sites-available/quizonline.foxugly.com.new /etc/nginx/sites-available/quizonline.foxugly.com; nginx -t || { mv /etc/nginx/sites-available/quizonline.foxugly.com.deploybak /etc/nginx/sites-available/quizonline.foxugly.com; exit 1; }; systemctl reload nginx'",
              "sudo -u django bash /var/www/django_websites/QuizOnline/deploy/ssm-deploy.sh $SHA $BUCKET",
              "chown -R django:www-data /var/www/django_websites/QuizOnline && chmod -R g-w,o-rwx /var/www/django_websites/QuizOnline"
            ],
            "executionTimeout": ["900"]
          }
          EOF
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "Deploy $SHA" \
            --cloud-watch-output-config CloudWatchOutputEnabled=true \
            --parameters file:///tmp/ssm-params.json \
            --query Command.CommandId --output text)
          echo "Command ID: $CMD_ID"
          echo "cmd_id=$CMD_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for SSM command to finish
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          CMD_ID: ${{ steps.ssm.outputs.cmd_id }}
        run: |
          # Poll every 5s until terminal state. The aws CLI returns
          # InvocationDoesNotExist for a few seconds after SendCommand
          # before the agent picks it up — swallow that specific case.
          for _ in $(seq 1 180); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --query Status --output text 2>/dev/null || echo Pending)
            case "$STATUS" in
              Success)
                echo "::group::stdout"
                aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardOutputContent --output text
                echo "::endgroup::"
                exit 0
                ;;
              Failed|Cancelled|TimedOut)
                echo "Deploy $STATUS"
                echo "::group::stdout"
                aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardOutputContent --output text
                echo "::endgroup::"
                echo "::group::stderr"
                aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardErrorContent --output text
                echo "::endgroup::"
                exit 1
                ;;
              *)
                sleep 5
                ;;
            esac
          done
          echo "Timed out waiting for SSM command after 15 minutes"
          exit 1
