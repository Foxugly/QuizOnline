name: Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

permissions:
  id-token: write    # required for OIDC token minting
  contents: read

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production    # gates the OIDC sub claim AND enables approval rules
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: quizonline-frontend/package-lock.json

      - name: Build frontend
        run: |
          cd quizonline-frontend
          npm ci
          npx ng build --configuration=production

      - name: Package frontend build
        id: package
        run: |
          tar -czf frontend-build.tar.gz -C quizonline-frontend/dist/quizonline-frontend/browser .
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: gh-actions-${{ github.run_id }}

      - name: Upload bundle to S3
        run: |
          aws s3 cp frontend-build.tar.gz \
            "s3://${{ secrets.S3_DEPLOY_BUCKET }}/builds/${{ steps.package.outputs.sha }}.tar.gz"

      - name: Trigger deploy on EC2 via SSM
        id: ssm
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          BUCKET: ${{ secrets.S3_DEPLOY_BUCKET }}
          SHA: ${{ steps.package.outputs.sha }}
        run: |
          # Two commands, ordered:
          #   1. git pull on EC2 — bootstraps the first run after this
          #      commit lands (deploy/ssm-deploy.sh may not exist yet
          #      on disk; once pulled, subsequent deploys find it).
          #   2. invoke ssm-deploy.sh with the SHA + bucket name.
          #
          # JSON quoting is fiddly — use a tmpfile so the YAML stays
          # readable and ``aws ssm`` doesn't see escaped-double-quote
          # soup on the command line.
          cat > /tmp/ssm-params.json <<EOF
          {
            "commands": [
              "sudo -u django bash -c 'cd /var/www/django_websites/QuizOnline && git fetch --quiet && git reset --hard --quiet origin/main'",
              "cp /var/www/django_websites/QuizOnline/deploy/quizonline-env-fetch.service /etc/systemd/system/quizonline-env-fetch.service",
              "cp /var/www/django_websites/QuizOnline/deploy/quizonline-frontend-runtime-fetch.service /etc/systemd/system/quizonline-frontend-runtime-fetch.service",
              "systemctl daemon-reload",
              "systemctl enable --quiet quizonline-frontend-runtime-fetch.service",
              "systemctl restart quizonline-frontend-runtime-fetch.service",
              "sudo -u django bash /var/www/django_websites/QuizOnline/deploy/ssm-deploy.sh $SHA $BUCKET"
            ],
            "executionTimeout": ["900"]
          }
          EOF
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "Deploy $SHA" \
            --cloud-watch-output-config CloudWatchOutputEnabled=true \
            --parameters file:///tmp/ssm-params.json \
            --query Command.CommandId --output text)
          echo "Command ID: $CMD_ID"
          echo "cmd_id=$CMD_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for SSM command to finish
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          CMD_ID: ${{ steps.ssm.outputs.cmd_id }}
        run: |
          # Poll every 5s until terminal state. The aws CLI returns
          # InvocationDoesNotExist for a few seconds after SendCommand
          # before the agent picks it up — swallow that specific case.
          for _ in $(seq 1 180); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --query Status --output text 2>/dev/null || echo Pending)
            case "$STATUS" in
              Success)
                echo "::group::stdout"
                aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardOutputContent --output text
                echo "::endgroup::"
                exit 0
                ;;
              Failed|Cancelled|TimedOut)
                echo "Deploy $STATUS"
                echo "::group::stdout"
                aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardOutputContent --output text
                echo "::endgroup::"
                echo "::group::stderr"
                aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardErrorContent --output text
                echo "::endgroup::"
                exit 1
                ;;
              *)
                sleep 5
                ;;
            esac
          done
          echo "Timed out waiting for SSM command after 15 minutes"
          exit 1
